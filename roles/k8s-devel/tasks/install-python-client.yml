#
#  Python Kubernetes client 導入
#
---

# 既定: ローカルパッケージ方式で Python 言語版 Kubernetes client を導入する
- name: Install kubernetes python client via local package role
  ansible.builtin.include_role:
    name: python-k8s-client-local
  vars:
    python_k8s_client_version_spec: "{{ k8s_devel_python_client_version_effective }}"
  when:
    - k8s_devel_python_client_enabled | bool
    - not (k8s_devel_python_client_install_via_pip | default(false) | bool)

# 互換性維持用: pip導入モードを明示的に有効化した場合のみ実行
- name: Install kubernetes python client via pip (legacy mode)
  ansible.builtin.pip:
    name: "kubernetes{{ k8s_devel_python_client_version_effective }}"
    state: present
    executable: "{{ k8s_devel_python_pip_executable_effective }}"
    extra_args: "{{ k8s_devel_python_pip_extra_args | default('') }}"
  when:
    - k8s_devel_python_client_enabled | bool
    - k8s_devel_python_client_install_via_pip | default(false) | bool
