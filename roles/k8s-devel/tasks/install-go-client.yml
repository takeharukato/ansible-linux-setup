#
#  Go Kubernetes client 導入
#
---

# Go インストールがスキップされた場合の警告
- name: Warn if go installation was skipped
  ansible.builtin.debug:
    msg: "WARNING: Go installation was skipped. Go client installation will be skipped."
  when:
    - k8s_devel_go_client_enabled | bool
    - go_installation_skipped | default(false)

# Go言語版 Kubernetes client 導入前にGo言語パッケージ導入状態を検証する
- name: Gather installed package facts for go client install precheck
  ansible.builtin.package_facts:
    manager: auto
  when:
    - k8s_devel_go_client_enabled | bool
    - not (go_installation_skipped | default(false))

# Go言語版 Kubernetes client 導入前にGo言語パッケージ導入状態を検証する
- name: Set go package install status for go client install precheck
  ansible.builtin.set_fact:
    k8s_devel_go_package_installed: >-
      {{
        ('go-lang' in ansible_facts.packages)
        or ('golang' in ansible_facts.packages)
        or ('golang-go' in ansible_facts.packages)
      }}
  when:
    - k8s_devel_go_client_enabled | bool
    - not (go_installation_skipped | default(false))

# Go言語が導入されていない場合は, Go言語版 Kubernetes client
# 導入を中止して, playbookを失敗させる
- name: Fail when go package is missing for go client install
  ansible.builtin.fail:
    msg: >-
      Configuration error: Go package is not installed.
      Install golang/go-lang package before enabling k8s_devel_go_client_enabled.
  when:
    - k8s_devel_go_client_enabled | bool
    - not (go_installation_skipped | default(false))
    - not (k8s_devel_go_package_installed | default(false))

# Go言語版 Kubernetes client 導入処理を実行する
- name: Install go kubernetes client via local package role
  ansible.builtin.include_role:
    name: go-k8s-client-local
  vars:
    go_k8s_client_version: "{{ k8s_devel_go_client_version_effective }}"
    go_k8s_client_module_domain: "{{ k8s_devel_go_module_domain }}"
    go_k8s_client_install_dir: "{{ k8s_devel_go_client_work_dir }}"
  when:
    - k8s_devel_go_client_enabled | bool
    - not (go_installation_skipped | default(false))
    - k8s_devel_go_package_installed | default(false)
