#
#  Go debソースビルド処理
#
---

# Goソースビルド処理のためのディレクトリを作成する
- name: Prepare local workspace for go deb build
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ go_build_workspace }}"
    - "{{ go_build_output_dir }}"
  delegate_to: "{{ go_build_host }}"
  run_once: true

# Go debビルドスクリプトを生成する
- name: Render go deb build script on build host
  ansible.builtin.template:
    src: build-go-deb.sh.j2
    dest: "{{ go_build_workspace }}/build-go-deb.sh"
    mode: "0755"
  delegate_to: "{{ go_build_host }}"
  run_once: true

# Go debビルド用Dockerfileを生成する
- name: Render go deb Dockerfile on build host
  ansible.builtin.template:
    src: Dockerfile.ubuntu.j2
    dest: "{{ go_build_workspace }}/Dockerfile.go-deb"
    mode: "0644"
  delegate_to: "{{ go_build_host }}"
  run_once: true

# Go debビルド用のコンテナイメージをDockerfileから生成する
- name: Build go deb builder container image from Dockerfile
  ansible.builtin.command:
    argv:
      - "{{ go_build_container_runtime }}"
      - build
      - --network
      - "{{ go_build_container_network_mode }}"
      - -t
      - "{{ go_build_container_image_debian }}"
      - -f
      - "{{ go_build_workspace }}/Dockerfile.go-deb"
      - "{{ go_build_workspace }}"
  async: "{{ go_pkg_build_timeout_seconds }}"
  poll: 0
  register: go_deb_builder_image_build_job
  delegate_to: "{{ go_build_host }}"
  run_once: true
  changed_when: true

# Go debビルド用コンテナイメージのビルド完了まで待機する
- name: Wait go deb builder image build with progress polling
  ansible.builtin.async_status:
    jid: "{{ go_deb_builder_image_build_job.ansible_job_id }}"
  register: go_deb_builder_image_build_cmd
  until: go_deb_builder_image_build_cmd.finished
  retries: "{{ (go_pkg_build_timeout_seconds // go_pkg_build_loop_delay_seconds) | int }}"
  delay: "{{ go_pkg_build_loop_delay_seconds }}"
  failed_when: (go_deb_builder_image_build_cmd.rc | default(0)) != 0
  delegate_to: "{{ go_build_host }}"
  run_once: true

# Go debパッケージをコンテナ内で構築する
- name: Build go deb package in container
  ansible.builtin.command:
    argv:
      - "{{ go_build_container_runtime }}"
      - run
      - --rm
      - --network
      - "{{ go_build_container_network_mode }}"
      - -e
      - "GO_VERSION={{ go_resolved_version }}"
      - -e
      - "GO_BASE_URL={{ go_base_url }}"
      - -e
      - "GO_ARCH={{ go_arch }}"
      - -e
      - "GO_DEB_ARCH={{ go_arch }}"
      - -e
      - "GO_PACKAGE_NAME={{ go_deb_package_name }}"
      - -e
      - "GO_INSTALL_DIR={{ go_install_dir }}"
      - -e
      - "GO_PROFILE_SCRIPT={{ go_profile_script }}"
      - -v
      - "{{ go_build_workspace }}:/work"
      - -w
      - /work
      - "{{ go_build_container_image_debian }}"
      - /bin/bash
      - /work/build-go-deb.sh
  async: "{{ go_pkg_build_timeout_seconds }}"
  poll: 0
  register: go_deb_package_build_job
  delegate_to: "{{ go_build_host }}"
  run_once: true
  changed_when: true

# Go debビルド完了まで待機する
- name: Wait go deb package build with progress polling
  ansible.builtin.async_status:
    jid: "{{ go_deb_package_build_job.ansible_job_id }}"
  register: go_deb_package_build_cmd
  until: go_deb_package_build_cmd.finished
  retries: "{{ (go_pkg_build_timeout_seconds // go_pkg_build_loop_delay_seconds) | int }}"
  delay: "{{ go_pkg_build_loop_delay_seconds }}"
  failed_when: (go_deb_package_build_cmd.rc | default(0)) != 0
  delegate_to: "{{ go_build_host }}"
  run_once: true

# Go debビルド標準出力を表示する
- name: Show go deb package build stdout lines
  ansible.builtin.debug:
    var: go_deb_package_build_cmd.stdout_lines
  when: (go_deb_package_build_cmd.stdout | default('') | length) > 0
  delegate_to: "{{ go_build_host }}"
  run_once: true

# Go deb成果物を探索する
- name: Discover built go deb files
  ansible.builtin.find:
    paths: "{{ go_build_output_dir }}"
    patterns: "{{ go_deb_package_name }}_{{ go_resolved_version }}-1_*.deb"
    file_type: file
  register: go_deb_files_discovered
  delegate_to: "{{ go_build_host }}"
  run_once: true

# Go deb成果物一覧を保存する
- name: Set built go deb package list
  ansible.builtin.set_fact:
    go_deb_files: "{{ go_deb_files_discovered.files | default([]) }}"
  delegate_to: "{{ go_build_host }}"
  delegate_facts: true
  run_once: true

# Go deb成果物が存在しない場合は失敗する
- name: Fail when go deb package was not generated
  ansible.builtin.fail:
    msg: "Go deb package was not generated for requested version {{ go_resolved_version }}"
  when: (go_deb_files_discovered.files | default([]) | length) == 0
  delegate_to: "{{ go_build_host }}"
  run_once: true

# Go debパッケージ版数を読み取る
- name: Read built go deb package version
  ansible.builtin.command:
    argv:
      - dpkg-deb
      - -f
      - "{{ (go_deb_files_discovered.files | map(attribute='path') | list | first) }}"
      - Version
  register: go_deb_pkg_version_cmd
  changed_when: false
  delegate_to: "{{ go_build_host }}"
  run_once: true

# Go debパッケージ版数が要求版数と一致することを確認する
- name: Assert built go deb package version matches request
  ansible.builtin.assert:
    that:
      - "(go_deb_pkg_version_cmd.stdout | trim | regex_replace('-.*$', '')) == (go_resolved_version | trim)"
    fail_msg: >-
      Built Go deb package version mismatch.
      requested={{ go_resolved_version | trim }}, built={{ go_deb_pkg_version_cmd.stdout | trim }}
  delegate_to: "{{ go_build_host }}"
  run_once: true
