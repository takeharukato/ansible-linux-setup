#
#  Go rpm導入処理
#
---

# 導入対象rpmファイルを解決する
# rpmファイルの探索順序は以下の通り:
# 1. last_go_rpm_file 変数が定義されていればそれを使用する
# 2. last_go_rpm_file 変数が定義されていなければ
#    go_build_host 変数で指定されたホストの last_go_rpm_file 変数を使用する
# 3. go_build_host 変数で指定されたホストの last_go_rpm_file 変数が定義されていなければ
#    localhost の last_go_rpm_file 変数を使用する
- name: Resolve go rpm file list scope (host or localhost)
  ansible.builtin.set_fact:
    go_rpm_source_files: >-
      {{
        ([last_go_rpm_file])
        if ((last_go_rpm_file | default({})) | length) > 0
        else (
          ([hostvars[go_build_host].last_go_rpm_file])
          if ((hostvars[go_build_host].last_go_rpm_file | default({})) | length) > 0
          else (
            ([hostvars['localhost'].last_go_rpm_file])
            if ((hostvars['localhost'].last_go_rpm_file | default({})) | length) > 0
            else []
          )
        )
      }}

# 導入対象rpmファイルが見つからない場合は失敗する
- name: Fail when no go rpm file is found in both host and localhost scopes
  ansible.builtin.fail:
    msg: "No go rpm file found in both host and localhost scopes."
  when: (go_rpm_source_files | default([]) | length) == 0

# 構築済みGo rpmパッケージの権限を調整する
- name: Ensure built go rpm package permissions are readable on build host
  ansible.builtin.file:
    path: "{{ item.path }}"
    mode: "0644"
  loop: "{{ go_rpm_source_files | default([]) }}"
  delegate_to: "{{ go_build_host }}"
  run_once: true

# 構築ホストから制御ホストへ回収するための一時ディレクトリを作成する
- name: Ensure local staging directory exists for go rpm packages
  ansible.builtin.tempfile:
    state: directory
    path: "{{ lookup('env', 'HOME') }}/.ansible/tmp"
    prefix: go-rpm-fetch-
  register: go_rpm_fetch_tmpdir
  delegate_to: localhost
  become: false
  run_once: true

# 構築済みGo rpmパッケージを制御ホストに回収する
- name: Fetch built go rpm packages from build host to controller
  ansible.builtin.fetch:
    src: "{{ item.path }}"
    dest: "{{ go_rpm_fetch_tmpdir.path }}/{{ item.path | basename }}"
    flat: true
  loop: "{{ go_rpm_source_files | default([]) }}"
  delegate_to: "{{ go_build_host }}"
  run_once: true

# 回収したGo rpmパッケージの存在を確認する
- name: Check fetched go rpm packages exist on controller
  ansible.builtin.stat:
    path: "{{ go_rpm_fetch_tmpdir.path }}/{{ item.path | basename }}"
  loop: "{{ go_rpm_source_files | default([]) }}"
  register: go_rpm_fetch_stat
  delegate_to: localhost
  become: false
  run_once: true

# 回収したGo rpmパッケージが存在しない場合は失敗する
- name: Fail when fetched go rpm package is missing on controller
  ansible.builtin.fail:
    msg: "Fetched go rpm package is missing on controller: {{ item.item.path | basename }}"
  loop: "{{ go_rpm_fetch_stat.results | default([]) }}"
  when: not (item.stat.exists | default(false))

# 回収済みGo rpmパッケージをターゲットホストへコピーする
- name: Copy built go rpm packages from controller to target host
  ansible.builtin.copy:
    src: "{{ go_rpm_fetch_tmpdir.path }}/{{ item.path | basename }}"
    dest: "/tmp/{{ item.path | basename }}"
    mode: "0644"
  loop: "{{ go_rpm_source_files | default([]) }}"

# Go rpmパッケージ導入用パスリストを構築する
# 1. go_rpm_source_filesが定義されていなければ空リストを返す
# 2. go_rpm_source_filesが定義されていれば, 以下のようにリストを構成して返却
#    a. そのファイルパス(各要素のpath属性)を抽出,
#    b. ディレクトリを除いた名前 (basename)を取得,
#    c. /tmp/ を先頭に付与
- name: Build local go rpm install list for one transaction
  ansible.builtin.set_fact:
    go_rpm_install_paths: >-
      {{
        (go_rpm_source_files | default([]))
        | map(attribute='path')
        | map('basename')
        | map('regex_replace', '^', '/tmp/')
        | list
      }}

# Go rpmパッケージを導入する
- name: Install local go rpm packages in one transaction
  ansible.builtin.dnf:
    name: "{{ go_rpm_install_paths }}"
    state: present
    disable_gpg_check: true
  become: true

# Go rpmパッケージが導入済みであることを確認する
- name: Query installed local go rpm package
  ansible.builtin.command:
    argv:
      - rpm
      - -q
      - "{{ go_rpm_package_name }}"
  register: go_rpm_pkg_query_cmd
  changed_when: false
  become: true

# Go rpmパッケージが導入済みであることを確認する
- name: Assert local go rpm package is installed
  ansible.builtin.assert:
    that:
      - go_rpm_pkg_query_cmd.rc == 0
    fail_msg: >-
      Local go rpm package is not installed.
      package={{ go_rpm_package_name }}

# 導入済みGo版数を確認する
- name: Get installed go version on target host
  ansible.builtin.command:
    argv:
      - "{{ go_command_from_tarball_path }}"
      - version
  register: go_installed_rpm_version_cmd
  changed_when: false
  become: true

# 導入済みGo版数が要求と一致することを確認する
- name: Assert installed go version matches request on RedHat family
  ansible.builtin.assert:
    that:
      - "(go_installed_rpm_version_cmd.stdout | regex_findall('go([0-9]+\\.[0-9]+\\.[0-9]+)') | first | default('')) == (go_resolved_version | trim)"
    fail_msg: >-
      Installed Go version mismatch.
      requested={{ go_resolved_version | trim }}, installed={{ go_installed_rpm_version_cmd.stdout | trim }}
