#
#  ロール固有変数のデフォルト値
#  group_vars/all/all.yml やhost_varsで上書き可能とするため,
#  ロール名/defaults/main.yml に定義している

---

# Go 言語版数
# 空文字列の場合は OS 提供パッケージを latest で導入する
go_lang_version: ""

# Go パッケージ名
go_package_name: "golang"

# Go パッケージ構築ホスト
go_build_host: "localhost"

# Go パッケージ構築作業ディレクトリ
go_build_workspace: "/tmp/go-build"

# Go パッケージ成果物出力ディレクトリ
go_build_output_dir: "{{ go_build_workspace }}/output"

# Go パッケージ構築タイムアウト(秒)
go_pkg_build_timeout_seconds: 3600

# Go パッケージ構築監視ポーリング間隔(秒)
go_pkg_build_loop_delay_seconds: 5

# Debian系でのaptロック待機時間(秒)
go_install_deb_lock_wait_seconds: 600

# 既存Goパッケージ削除有無
go_lang_remove_existing_package: true

# コンテナビルド用ランタイム
go_build_container_runtime: "docker"

# コンテナビルド用ネットワークモード
go_build_container_network_mode: "host"

# Goビルド用コンテナイメージ
go_build_container_image_debian: "go-build-ubuntu:24.04"
go_build_container_image_rhel: "go-build-almalinux:9.6"

# Goビルド時のworkdir
go_build_container_workdir: "/work"
