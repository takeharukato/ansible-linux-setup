#
#  control plane 登録タスク
#
---

# 登録対象ホストを自動解決し, 代表ノード判定を行う。
- name: "Discover target hosts"
  ansible.builtin.include_tasks: discover-target-hosts.yml
  when: not (k8s_register_image_skip_discovery | bool)

# k8s_register_image_target_kind を control-plane に設定の上,
# control plane 登録対象ホストに対して, register-single-node.yml を呼び出し,
# control plane ホストに対してイメージ登録を行う。
- name: "Register images on each control plane host"
  ansible.builtin.include_tasks: register-single-node.yml
  loop: "{{ k8s_register_image_control_plane_hosts }}"
  loop_control:
    loop_var: target_host
    label: "{{ target_host }}"
  vars:
    k8s_register_image_target_kind: "control-plane"
  when: k8s_register_image_is_cluster_leader | default(true) | bool
