#
#  Python 言語版 Kubernetes client rpm導入処理
#
---

# Python 言語版 Kubernetes client の rpmパッケージ成果物の一覧を
# ホスト側とコントローラ側の両方のスコープで検索し, 見つかった方を採用し,
# python_k8s_client_rpm_source_files変数に格納する
- name: Resolve python k8s client rpm file list scope (host or localhost)
  ansible.builtin.set_fact:
    python_k8s_client_rpm_source_files: >-
      {{
        ([last_python_k8s_client_rpm_file])
        if ((last_python_k8s_client_rpm_file | default({})) | length) > 0
        else (
          ([hostvars[python_k8s_client_build_host].last_python_k8s_client_rpm_file])
          if ((hostvars[python_k8s_client_build_host].last_python_k8s_client_rpm_file | default({})) | length) > 0
          else (
            ([hostvars['localhost'].last_python_k8s_client_rpm_file])
            if ((hostvars['localhost'].last_python_k8s_client_rpm_file | default({})) | length) > 0
            else []
          )
        )
      }}

# rpmパッケージ成果物が見つからなければ処理を中断する
- name: Fail when no python k8s client rpm file is found in both host and localhost scopes
  ansible.builtin.fail:
    msg: "No python k8s client rpm file found in both host and localhost scopes."
  when: (python_k8s_client_rpm_source_files | default([]) | length) == 0

# 構築ホスト上のPython 言語版 Kubernetes client rpmパッケージのパーミッションを
# 読み取り可能に変更する
- name: Ensure built python k8s client rpm package permissions are readable on build host
  ansible.builtin.file:
    path: "{{ item.path }}"
    mode: "0644"
  loop: "{{ python_k8s_client_rpm_source_files | default([]) }}"
  delegate_to: "{{ python_k8s_client_build_host }}"
  run_once: true

# 構築ホストから制御ホストへ回収するための一時ディレクトリを作成する
- name: Ensure local staging directory exists for python k8s client rpm packages
  ansible.builtin.tempfile:
    state: directory
    path: "{{ lookup('env', 'HOME') }}/.ansible/tmp"
    prefix: python-k8s-client-rpm-fetch-
  register: python_k8s_client_rpm_fetch_tmpdir
  delegate_to: localhost
  become: false
  run_once: true

# 構築ホストから制御ホストへ回収する
- name: Fetch built python k8s client rpm packages from build host to controller
  ansible.builtin.fetch:
    src: "{{ item.path }}"
    dest: "{{ python_k8s_client_rpm_fetch_tmpdir.path }}/{{ item.path | basename }}"
    flat: true
  loop: "{{ python_k8s_client_rpm_source_files | default([]) }}"
  delegate_to: "{{ python_k8s_client_build_host }}"
  run_once: true

# 制御ホストからターゲットホストへrpmパッケージをコピーする
- name: Copy built python k8s client rpm packages from controller to target host
  ansible.builtin.copy:
    src: "{{ python_k8s_client_rpm_fetch_tmpdir.path }}/{{ item.path | basename }}"
    dest: "/tmp/{{ item.path | basename }}"
    mode: "0644"
  loop: "{{ python_k8s_client_rpm_source_files | default([]) }}"

# Python 言語版 Kubernetes client の rpmパッケージを
# インストールするための コマンドライン引数を構築する
- name: Build local python k8s client rpm install list for one transaction
  ansible.builtin.set_fact:
    python_k8s_client_rpm_install_paths: >-
      {{
        (python_k8s_client_rpm_source_files | default([]))
        | map(attribute='path')
        | map('basename')
        | map('regex_replace', '^', '/tmp/')
        | list
      }}

# Python 言語版 Kubernetes client の rpmパッケージを
# インストールする
- name: Install local python k8s client rpm packages in one transaction
  ansible.builtin.dnf:
    name: "{{ python_k8s_client_rpm_install_paths }}"
    state: present
    disable_gpg_check: true
  become: true

# Python 言語版 Kubernetes client の rpmパッケージが
# 正しく導入されたことを確認するために, rpm -q で
# パッケージの状態を確認する
- name: Query installed local python k8s client rpm package
  ansible.builtin.command:
    argv:
      - rpm
      - -q
      - "{{ python_k8s_client_rpm_package_name }}"
  register: python_k8s_client_rpm_pkg_query_cmd
  changed_when: false
  become: true

# Python 言語版 Kubernetes client の rpmパッケージが
# インストールされていなければ処理を中断する
- name: Assert local python k8s client rpm package is installed
  ansible.builtin.assert:
    that:
      - python_k8s_client_rpm_pkg_query_cmd.rc == 0
    fail_msg: >-
      Local python k8s client rpm package is not installed.
      package={{ python_k8s_client_rpm_package_name }}

# 期待した版数がインストールされていることをvenv環境内のPythonから確認するために, Pythonで
# kubernetesモジュールをimportし, バージョンを取得する
- name: Query installed kubernetes python client version from local venv on RedHat family
  ansible.builtin.command:
    argv:
      - "{{ python_k8s_client_install_dir }}/venv/bin/python"
      - -c
      - >-
        import kubernetes; print(kubernetes.__version__)
  register: python_k8s_client_rpm_installed_version_cmd
  changed_when: false
  become: true

# インストールされた版数が要求された版数と異なる場合は処理を中断する
- name: Assert installed kubernetes python client satisfies requested spec on RedHat family
  ansible.builtin.command:
    argv:
      - "{{ python_k8s_client_install_dir }}/venv/bin/python"
      - -c
      - >-
        import sys;
        from packaging.specifiers import SpecifierSet;
        spec = sys.argv[1];
        ver = sys.argv[2].strip();
        s = SpecifierSet(spec);
        raise SystemExit(0 if s.contains(ver, prereleases=True) else 1)
      - "{{ python_k8s_client_version_spec }}"
      - "{{ python_k8s_client_rpm_installed_version_cmd.stdout | trim }}"
  register: python_k8s_client_rpm_spec_assert_cmd
  changed_when: false
  failed_when: python_k8s_client_rpm_spec_assert_cmd.rc != 0
  become: true
