#
#  Python 言語版 Kubernetes client rpmソースビルド処理
#
---

# Python 言語版 Kubernetes client の rpmパッケージを
# 構築するための作業ディレクトリを作成する
- name: Prepare local workspace for python k8s client rpm build
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ python_k8s_client_build_workspace }}"
    - "{{ python_k8s_client_build_output_dir }}"
  delegate_to: "{{ python_k8s_client_build_host }}"
  run_once: true

# Python 言語版 Kubernetes client の rpmパッケージを
# 構築するためのスクリプトを生成する
- name: Render python k8s client rpm build script on build host
  ansible.builtin.template:
    src: build-python-k8s-client-rpm.sh.j2
    dest: "{{ python_k8s_client_build_workspace }}/build-python-k8s-client-rpm.sh"
    mode: "0755"
  delegate_to: "{{ python_k8s_client_build_host }}"
  run_once: true

# Python 言語版 Kubernetes client の rpmパッケージを
# 構築するためのspecファイルを生成する
- name: Render python k8s client rpm spec template on build host
  ansible.builtin.template:
    src: python-k8s-client.spec.j2
    dest: "{{ python_k8s_client_build_workspace }}/python-k8s-client.spec"
    mode: "0644"
  delegate_to: "{{ python_k8s_client_build_host }}"
  run_once: true

# Python 言語版 Kubernetes client の rpmパッケージを
# 構築するためのDockerfileを生成する
- name: Render python k8s client rpm Dockerfile on build host
  ansible.builtin.template:
    src: Dockerfile.almalinux.j2
    dest: "{{ python_k8s_client_build_workspace }}/Dockerfile.python-k8s-client-rpm"
    mode: "0644"
  delegate_to: "{{ python_k8s_client_build_host }}"
  run_once: true

# Python 言語版 Kubernetes client の rpmパッケージを
# 構築するためのコンテナ環境をDockerfileから生成する
- name: Build python k8s client rpm builder container image from Dockerfile
  ansible.builtin.command:
    argv:
      - "{{ python_k8s_client_build_container_runtime }}"
      - build
      - --network
      - "{{ python_k8s_client_build_container_network_mode }}"
      - -t
      - "{{ python_k8s_client_build_container_image_rhel }}"
      - -f
      - "{{ python_k8s_client_build_workspace }}/Dockerfile.python-k8s-client-rpm"
      - "{{ python_k8s_client_build_workspace }}"
  async: "{{ python_k8s_client_build_timeout_seconds }}"
  poll: 0
  register: python_k8s_client_rpm_builder_image_build_job
  delegate_to: "{{ python_k8s_client_build_host }}"
  run_once: true
  changed_when: true

# Python 言語版 Kubernetes client の rpmパッケージの
# コンテナ環境生成を待ち合わせる
- name: Wait python k8s client rpm builder image build with progress polling
  ansible.builtin.async_status:
    jid: "{{ python_k8s_client_rpm_builder_image_build_job.ansible_job_id }}"
  register: python_k8s_client_rpm_builder_image_build_cmd
  until: python_k8s_client_rpm_builder_image_build_cmd.finished
  retries: "{{ (python_k8s_client_build_timeout_seconds // python_k8s_client_build_loop_delay_seconds) | int }}"
  delay: "{{ python_k8s_client_build_loop_delay_seconds }}"
  failed_when: (python_k8s_client_rpm_builder_image_build_cmd.rc | default(0)) != 0
  delegate_to: "{{ python_k8s_client_build_host }}"
  run_once: true

# Python 言語版 Kubernetes client の rpmパッケージをコンテナ環境内で構築する
- name: Build python k8s client rpm package in container
  ansible.builtin.command:
    argv:
      - "{{ python_k8s_client_build_container_runtime }}"
      - run
      - --rm
      - --network
      - "{{ python_k8s_client_build_container_network_mode }}"
      - -e
      - "K8S_PY_CLIENT_VERSION_SPEC={{ python_k8s_client_version_spec }}"
      - -e
      - "K8S_PY_CLIENT_RPM_PACKAGE_NAME={{ python_k8s_client_rpm_package_name }}"
      - -e
      - "K8S_PY_CLIENT_PYTHON_VERSION={{ (k8s_python_packages_version | default('', true) | string | trim) }}"
      - -v
      - "{{ python_k8s_client_build_workspace }}:/work"
      - -w
      - /work
      - "{{ python_k8s_client_build_container_image_rhel }}"
      - /bin/bash
      - /work/build-python-k8s-client-rpm.sh
  async: "{{ python_k8s_client_build_timeout_seconds }}"
  poll: 0
  register: python_k8s_client_rpm_package_build_job
  delegate_to: "{{ python_k8s_client_build_host }}"
  run_once: true
  changed_when: true

# Python 言語版 Kubernetes client の rpmパッケージ構築処理が完了するまで待機する
- name: Wait python k8s client rpm package build with progress polling
  ansible.builtin.async_status:
    jid: "{{ python_k8s_client_rpm_package_build_job.ansible_job_id }}"
  register: python_k8s_client_rpm_package_build_cmd
  until: python_k8s_client_rpm_package_build_cmd.finished
  retries: "{{ (python_k8s_client_build_timeout_seconds // python_k8s_client_build_loop_delay_seconds) | int }}"
  delay: "{{ python_k8s_client_build_loop_delay_seconds }}"
  failed_when: (python_k8s_client_rpm_package_build_cmd.rc | default(0)) != 0
  delegate_to: "{{ python_k8s_client_build_host }}"
  run_once: true

# Python 言語版 Kubernetes client の rpmパッケージ成果物の一覧を取得する
- name: Discover built python k8s client rpm files
  ansible.builtin.find:
    paths: "{{ python_k8s_client_build_output_dir }}"
    patterns: "{{ python_k8s_client_rpm_package_name }}-*.rpm"
    file_type: file
  register: python_k8s_client_rpm_files_discovered
  delegate_to: "{{ python_k8s_client_build_host }}"
  run_once: true

# 構築されたPython 言語版 Kubernetes client の
# rpmパッケージのうち最新のものをlast_python_k8s_client_rpm_file変数に格納する
- name: Set latest built python k8s client rpm package
  ansible.builtin.set_fact:
    last_python_k8s_client_rpm_file: "{{ python_k8s_client_rpm_files_discovered.files | sort(attribute='mtime') | last }}"
  delegate_to: "{{ python_k8s_client_build_host }}"
  delegate_facts: true
  run_once: true

# Python 言語版 Kubernetes client の rpmパッケージ成果物が存在しない場合は失敗させる
- name: Fail when python k8s client rpm package was not generated
  ansible.builtin.fail:
    msg: >-
      Python k8s client rpm package was not generated for requested spec {{ python_k8s_client_version_spec }}
  when: (python_k8s_client_rpm_files_discovered.files | default([]) | length) == 0
  delegate_to: "{{ python_k8s_client_build_host }}"
  run_once: true
