# source-urls.yml の読込と git 操作に必要な最小依存を導入する。
- name: Install prerequisite packages for OpenGrok source sync
  become: true
  ansible.builtin.package:
    name:
      - git
      - logrotate
      - python3
      - "{{ opengrok_python_yaml_package }}"
    state: present
