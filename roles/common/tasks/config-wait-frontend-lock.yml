#
# Debian系でのフロントエンドロック獲得失敗により
# apt updateが失敗しないようにするためのタスク
#

# ロックファイル監視処理のためにpsmiscパッケージをインストール
- name: "Ensure psmisc package is installed (provides fuser command)"
  ansible.builtin.package:
    name: psmisc
    state: present
  become: true

# unattended-upgradeサービスを停止し, apt操作に失敗しないようにする
# playbook実行中にunattended-upgradeサービスが, /var/lib/dpkg/lock-frontendを
# 使用することで, apt 操作が失敗することがあるため, playbook実行中は
# サービスを停止する
- name: "Stop unattended-upgrades service"
  ansible.builtin.service:
    name: unattended-upgrades
    state: stopped
    enabled: false
  become: true

# playbook完了後にunattended-upgradeサービスを再起動するため,
# notifyでunattended_upgrades_restarted_and_enabledハンドラを呼び出す
- name: "Notify to restart and enable unattended-upgrades service"
  ansible.builtin.debug:
    msg: "Notify to restart and enable unattended-upgrades service"
  changed_when: true
  notify:
    - "unattended_upgrades_restarted_and_enabled"

# aptのロックファイルを監視し、ロックが解除されるまで待機する
- name: "Wait for apt lock files to be released"
  ansible.builtin.command:
    cmd: "fuser {{ item }}"
  register: apt_lock_check
  changed_when: false
  failed_when: false
  until: apt_lock_check.rc == 1
  retries: "{{ (apt_lock_wait_timeout / apt_lock_check_interval) | int }}"
  delay: "{{ apt_lock_check_interval }}"
  loop: "{{ apt_lock_files }}"
  become: true
