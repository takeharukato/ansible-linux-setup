#
#  ロール固有変数のデフォルト値
#  group_vars/all/all.yml やhost_varsで上書き可能とするため,
#  ロール名/defaults/main.yml に定義している

# virtual cluster用CoreDNSを構築する場合は, trueに設定する。
k8s_vc_tenant_dns_enabled: false

#
# CoreDNS関連設定
#

# virtual cluster用CoreDNSのソースコードURL
k8s_vc_tenant_dns_coredns_source_url: "https://github.com/coredns/coredns.git"
# virtual cluster用CoreDNSのバージョン
k8s_vc_tenant_dns_version: "v1.11.3"
# virtual cluster用CoreDNSの公開ポート (内部変数)
k8s_vc_tenant_dns_port_dns: 53
# virtual cluster用CoreDNSのmetricsポート (内部変数)
k8s_vc_tenant_dns_port_metrics: 9153
# virtual cluster用CoreDNSのlivenessポート (内部変数)
k8s_vc_tenant_dns_port_health: 8080
# virtual cluster用CoreDNSのreadinessポート (内部変数)
k8s_vc_tenant_dns_port_ready: 8181

#
# コンテナイメージ構築関連設定
#
# virtual cluster用CoreDNSのイメージ名 (内部変数)
k8s_vc_tenant_dns_image: "vc-tenant-dns:{{ k8s_vc_tenant_dns_version }}"
# virtual cluster用CoreDNSコンテナイメージファイル名 (内部変数)
k8s_vc_tenant_dns_image_file: "vc-tenant-dns-{{ k8s_vc_tenant_dns_version }}.tar"
# コンテナイメージをビルドするホスト
k8s_vc_tenant_dns_build_host: "localhost"
# コンテナイメージ構築作業ディレクトリ
k8s_vc_tenant_dns_work_dir: "/tmp/k8s-vc-tenant-dns-work"
# コンテナイメージ構築用ディレクトリ
k8s_vc_tenant_dns_build_dir: "{{ k8s_vc_tenant_dns_work_dir }}/build"
# ビルドホスト上のコンテナイメージ出力先
k8s_vc_tenant_dns_output_dir: "{{ k8s_vc_tenant_dns_work_dir }}/output"
# 制御ホスト上のコンテナイメージtar保管先
k8s_vc_tenant_dns_output_dir_on_control_host: "{{ k8s_vc_tenant_dns_work_dir }}/artifacts"
# Go言語のバージョン
# go言語環境のalpine Linux(コンテナイメージ作成用軽量Linux)が提供するバージョンを使用する必要がある。
# alpine3.20ではGo1.22を前提とした環境であるため, 1.22を指定する。alpine3.19以前ではGo1.21以前の環境であるため, 1.21以下を指定する必要がある。
k8s_vc_tenant_dns_go_version: "1.22"
# コンテナイメージのベースイメージとして使用するAlpine Linuxのバージョン
k8s_vc_tenant_dns_alpine_version: "{{ alpine_version|default('3.20', true) }}"
# docker build 時のネットワークモード
# host を指定するとビルドコンテナがホストのDNS設定を引き継ぐ
k8s_vc_tenant_dns_docker_build_network: "host"
# 未修飾名イメージ記述時に補完するレジストリ名
k8s_vc_tenant_dns_unqualified_image_registry: "docker.io"
# K8sノード上のイメージ配置先一時ディレクトリ
k8s_vc_tenant_dns_remote_cache_dir: "/tmp/k8s-vc-tenant-dns-register"
# ワーカーノード自動検出時に参照する kubeconfig のパス
k8s_vc_tenant_dns_kubeconfig_path: "/etc/kubernetes/admin.conf"
# k8sノードへの登録後に一時tarファイルを削除するかどうか
k8s_vc_tenant_dns_cleanup_remote_tar: true
#
# Kubernetes関連設定
#

# 環境セットアップ時のスクリプト格納先ディレクトリのプレフィックス
k8s_vc_tenant_dns_k8s_manifest_dir_prefix: "{{ k8s_node_setup_tools_prefix|default('/opt/k8snodes', true) }}"
# manifestファイルの格納先ディレクトリ
# 実際のファイル名は vcinstances_virtualclusters の各 name ごとに
# vc-tenant-dns-<tenant-name>.yml 形式で生成する
k8s_vc_tenant_dns_k8s_manifest_dir: "{{ k8s_vc_tenant_dns_k8s_manifest_dir_prefix }}/vc-tenant-dns/manifests"

# マニフェストで使用するイメージ参照先
# 設定した場合はローカルレジストリを参照する。未設定の場合は containerd に
# 直接登録したイメージ名 (k8s_vc_tenant_dns_image) を使用する
k8s_vc_tenant_dns_image_registry: ""

# Kubernetesクラスタのコントロールプレイン/ワーカーノードの
# Container Runtime Interface (CRI)にk8s-vc-tenant-dnsイメージを
# 登録する場合はtrueに設定する。
# 既定値では, k8s_vc_tenant_dns_image_registry が空なら true,
# それ以外なら false を選択する。
k8s_vc_tenant_dns_register_to_k8s_nodes_enabled: "{{ (k8s_vc_tenant_dns_image_registry | default('', true) | trim | length) == 0 }}"

# k8s-vc-tenant-dnsを展開するNamespace
k8s_vc_tenant_dns_k8s_namespace: "default"
# k8s-vc-tenant-dnsのPod名
k8s_vc_tenant_dns_k8s_pod_name: "vc-tenant-dns"

# VirtualCluster 管理 namespace
k8s_vc_tenant_dns_virtualcluster_namespace: "{{ virtualcluster_namespace | default('vc-manager', true) }}"

# スーパークラスタ操作用 kubeconfig
k8s_vc_tenant_dns_supercluster_kubeconfig_path: "{{ virtualcluster_supercluster_kubeconfig_path | default('/etc/kubernetes/admin.conf', true) }}"
