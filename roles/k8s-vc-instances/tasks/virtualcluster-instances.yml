#
#  Virtual Clusterインスタンスのバリデーション
#
---

# VirtualClusterの必須フィールドが存在しない場合は, 警告を出力して当該エントリをスキップする
- name: "Warn missing VirtualCluster required fields"
  ansible.builtin.debug:
    msg: "Skip VirtualCluster instance because name or clusterVersionName is missing: {{ item }}"
  loop: "{{ vcinstances_virtualclusters | default([], true) }}"
  loop_control:
    label: "{{ item.name | default('undefined') }}"
  when:
    - item.name is not defined or (item.name | string | length) == 0
      or item.clusterVersionName is not defined or (item.clusterVersionName | string | length) == 0

# VirtualClusterインスタンスを生成して適用するためのmanifestをテンプレートから生成
- name: "Generate VirtualCluster instance manifests"
  ansible.builtin.template:
    src: "virtualcluster-instance.yaml.j2"
    dest: "{{ vcinstances_config_dir }}/virtualcluster-{{ item.name }}.yaml"
    mode: "0644"
  loop: "{{ vcinstances_virtualclusters | default([], true) }}"
  loop_control:
    label: "{{ item.name }}"
  when:
    - item.name is defined
    - (item.name | string | length) > 0
    - item.clusterVersionName is defined
    - (item.clusterVersionName | string | length) > 0

# VirtualCluster作成前にvc-managerのデプロイ完了を待機
- name: "Wait for vc-manager Deployment to be ready before creating VirtualClusters"
  ansible.builtin.command:
    cmd: >-
      kubectl --kubeconfig {{ virtualcluster_supercluster_kubeconfig_path }}
      rollout status deployment/vc-manager
      -n {{ virtualcluster_namespace }}
      --timeout=5m
  become: true
  changed_when: false

# VirtualCluster作成前にwebhook Serviceの存在を待機
- name: "Wait for virtualcluster webhook Service to exist"
  ansible.builtin.command:
    cmd: >-
      kubectl --kubeconfig {{ virtualcluster_supercluster_kubeconfig_path }}
      get service virtualcluster-webhook-service
      -n {{ virtualcluster_namespace }}
  register: result_webhook_service_ready
  until: result_webhook_service_ready.rc == 0
  retries: 60
  delay: 2
  become: true
  changed_when: false

# VirtualCluster作成前にwebhook EndpointのReadyアドレスを待機
- name: "Wait for virtualcluster webhook Endpoints to be ready"
  ansible.builtin.command:
    cmd: >-
      kubectl --kubeconfig {{ virtualcluster_supercluster_kubeconfig_path }}
      get endpoints virtualcluster-webhook-service
      -n {{ virtualcluster_namespace }}
      -o jsonpath={.subsets[0].addresses[0].ip}
  register: result_webhook_endpoints_ready
  until: result_webhook_endpoints_ready.rc == 0 and (result_webhook_endpoints_ready.stdout | length) > 0
  retries: 60
  delay: 2
  become: true
  changed_when: false

# 生成したVirtualClusterManifestを適用
- name: "Apply VirtualCluster instances"
  ansible.builtin.command:
    cmd: "kubectl --kubeconfig {{ virtualcluster_supercluster_kubeconfig_path }} apply -f {{ vcinstances_config_dir }}/virtualcluster-{{ item.name }}.yaml"
  loop: "{{ vcinstances_virtualclusters | default([], true) }}"
  loop_control:
    label: "{{ item.name }}"
  register: result_apply_vc
  become: true
  changed_when: >-
    'created' in result_apply_vc.stdout
    or 'configured' in result_apply_vc.stdout
  when:
    - item.name is defined
    - (item.name | string | length) > 0
    - item.clusterVersionName is defined
    - (item.clusterVersionName | string | length) > 0

# VirtualClusterインスタンスの生成が完了するまで待機
- name: "Wait for VirtualCluster instances to be created"
  ansible.builtin.command:
    cmd: >
      kubectl --kubeconfig {{ virtualcluster_supercluster_kubeconfig_path }}
      get virtualcluster {{ item.name }}
      -n {{ item.namespace | default(virtualcluster_namespace, true) }}
  loop: "{{ vcinstances_virtualclusters | default([], true) }}"
  loop_control:
    label: "{{ item.name }}"
  register: result_vc_created
  until: result_vc_created.rc == 0
  retries: 30
  delay: 2
  become: true
  changed_when: false
  when:
    - item.name is defined
    - (item.name | string | length) > 0
    - item.clusterVersionName is defined
    - (item.clusterVersionName | string | length) > 0
