# kube-apiが使えるようになるのを待ち合わせる
- name: Wait for kube-api-server
  ansible.builtin.wait_for:
    host: "{{ k8s_api_wait_host }}"
    port: "{{ k8s_api_wait_port }}"
    state: started
    timeout: "{{ k8s_api_wait_timeout }}"
    delay: "{{ k8s_api_wait_delay }}"
    sleep: "{{ k8s_api_wait_sleep }}"
  delegate_to: "{{ k8s_api_wait_delegate_to }}"

# Whereaboutsのインストール
- name: Install Whereabouts
  ansible.builtin.shell: |
    helm upgrade --install whereabouts {{ k8s_whereabouts_chart_url }} \
    --namespace kube-system \
    --version {{ k8s_whereabouts_helm_chart_version }}
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  become: true
  register: _result
  changed_when: _result.rc == 0

# NetworkAttachmentDefinition (NAD)設定ファイル生成
- name: Setup whereabouts NetworkAttachmentDefinition (NAD) file
  ansible.builtin.template:
    src: ipvlan-wb-nad.yml.j2
    dest: "{{ k8s_whereabouts_config_dir }}/ipvlan-wb-nad.yml"
    owner: root
    group: root
    mode: '0644'
    backup: false

# 旧設定(default namespace)のNADが残っている場合は削除し, 期待状態(kube-system)へ収束させる
- name: Delete legacy whereabouts NetworkAttachmentDefinition (NAD) in default namespace
  ansible.builtin.shell: |
    kubectl delete network-attachment-definitions.k8s.cni.cncf.io ipvlan-wb \
      -n default --ignore-not-found
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  become: true
  register: _nad_cleanup_result
  changed_when: '"deleted" in (_nad_cleanup_result.stdout | lower)'

# NetworkAttachmentDefinition (NAD)適用
- name: Apply NetworkAttachmentDefinition (NAD)
  ansible.builtin.shell: |
    kubectl apply -f "{{ k8s_whereabouts_config_dir }}/ipvlan-wb-nad.yml"
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  become: true
  register: _result
  changed_when: >-
    ' created' in (_result.stdout | lower)
    or ' configured' in (_result.stdout | lower)
