#  パッケージ関連処理
---

- name: Install prerequisites (Debian)
  ansible.builtin.apt:
    name:
      - ca-certificates
    state: present
    update_cache: true
  become: true
  when: ansible_facts.os_family == 'Debian'

- name: Install prerequisites (RedHat)
  ansible.builtin.dnf:
    name:
      - ca-certificates
    state: present
  become: true
  when: ansible_facts.os_family == 'RedHat'

- name: Install sbom-tool binary (using get_url with curl fallback)
  when: not (ansible_url_module_https_workaround_enabled | default(false))
  become: true
  block:
    - name: Install sbom-tool binary (using get_url)
      ansible.builtin.get_url:
        url: "{{ sbom_tool_download_url }}"
        dest: "{{ sbom_tool_bin_path }}"
        mode: '0755'
        checksum: "{{ sbom_tool_checksum | default(omit, true) }}"
  rescue:
    - name: Install sbom-tool binary (curl fallback when get_url fails)  # noqa command-instead-of-module
      ansible.builtin.command:
        argv:
          - curl
          - -fsSL
          - --retry
          - '5'
          - --retry-delay
          - '2'
          - --connect-timeout
          - '10'
          - --max-time
          - '120'
          - --output
          - "{{ sbom_tool_bin_path }}"
          - "{{ sbom_tool_download_url }}"
      register: sbom_tool_download_get_url_fallback_result
      changed_when: sbom_tool_download_get_url_fallback_result.rc == 0

- name: Install sbom-tool binary (curl workaround)  # noqa command-instead-of-module
  ansible.builtin.command:
    argv:
      - curl
      - -fsSL
      - --retry
      - '5'
      - --retry-delay
      - '2'
      - --connect-timeout
      - '10'
      - --max-time
      - '120'
      - --output
      - "{{ sbom_tool_bin_path }}"
      - "{{ sbom_tool_download_url }}"
  register: sbom_tool_download_curl_result
  changed_when: sbom_tool_download_curl_result.rc == 0
  when: ansible_url_module_https_workaround_enabled | default(false)

- name: Ensure sbom-tool binary mode
  ansible.builtin.file:
    path: "{{ sbom_tool_bin_path }}"
    mode: '0755'
  when: ansible_url_module_https_workaround_enabled | default(false)
  become: true
# EOF
