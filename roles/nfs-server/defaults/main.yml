#
#  ロール固有変数のデフォルト値
#  group_vars/all/all.yml やhost_varsで上書き可能とするため,
#  ロール名/defaults/main.yml に定義している
---
#
# NFSサーバ
#

# NFSで公開するディレクトリ
nfs_export_directory: "/home/nfsshare"
# DNSドメイン名(未設定時は空文字)
dns_domain: ""
# NFSのクライアントアドレス
# (ネットワークアドレスを指定, 未設定時は空文字列)
nfs_network: ""
# NFS exportのオプション
# (未定義時, または, 空文字列を指定した場合は, NFSのデフォルト動作を使用)
nfs_options: ""
