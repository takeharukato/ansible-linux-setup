# Containerdの設定

# overlay, br_netfilter モジュールのロード
- name: Load overlay, br_netfilter modules
  ansible.builtin.shell: |
    modprobe overlay
    modprobe br_netfilter
  become: true
  register: _result
  changed_when: _result.rc == 0


# moduleの設定
- name: Setup modules /etc/modules-load.d/k8s.conf
  ansible.builtin.template:
    src: modules-k8s.conf.j2
    dest: /etc/modules-load.d/k8s.conf
    owner: root
    group: root
    mode: '0644'
    backup: false

# IPv4/IPv6フォワーディングを有効化
- name: Setup containerd /etc/sysctl.d/99-k8s-cri.conf
  ansible.builtin.template:
    src: 99-k8s-cri.conf.j2
    dest: /etc/sysctl.d/99-k8s-cri.conf
    owner: root
    group: root
    mode: '0644'
    backup: false
  notify: "apply_sysctl"

- name: Apply sysctl immediately
  ansible.builtin.command: sysctl --system
  become: true
  register: _result
  changed_when: _result.rc == 0


#
# GRUB 設定の更新 (Debian 系)
#
- name: "Config Grub Debian"
  ansible.builtin.include_tasks: config-grub-debian.yml
  when:
    - ansible_facts.os_family == 'Debian'

#
# GRUB 設定の更新 (RHEL 系)
#
- name: "Config Grub Rhel"
  ansible.builtin.include_tasks: config-grub-rhel.yml
  when:
    - ansible_facts.os_family == 'RedHat'

#
# containerd の設定
#
- name: Create /etc/systemd/system/containerd.service.d
  ansible.builtin.file:
    path: "/etc/systemd/system/containerd.service.d"
    state: directory
    owner: "root"
    group: "root"
    mode: "755"

- name: Create /etc/containerd directory
  ansible.builtin.file:
    path: "/etc/containerd"
    state: directory
    owner: "root"
    group: "root"
    mode: "755"

- name: Rm /etc/containerd/config.toml
  ansible.builtin.file:
    path: "/etc/containerd/config.toml"
    state: absent
  become: true

# Containerd の設定ファイルを生成
- name: "Generate containerd config"
  ansible.builtin.shell: |
    set -o pipefail
    containerd config default | sudo tee /etc/containerd/config.toml
  args:
    executable: /bin/bash
  become: true
  register: _result
  changed_when: _result.rc == 0

# Containerd 側 Cgroup ドライバーとしてSystemdを選択
- name: "Set the systemd driver as containerd cgroup driver"
  ansible.builtin.lineinfile:
    path: /etc/containerd/config.toml
    state: "present"
    backrefs: "yes"
    regexp: '^\s*SystemdCgroup\s*=\s*false\s*$'
    line: 'SystemdCgroup = true'
  become: true

# Containerd 側のコンテナレジストリ設定
# config_path = "..."形式の既存行が存在する場合は置換, 存在しない場合は追加する
# 既存行がある場合は, その行を"/etc/containerd/certs.d"に置換する
# 既存行がない場合は, [plugins."io.containerd.grpc.v1.cri".registry]の直後に
# config_path = "/etc/containerd/certs.d"
# を追加する
- name: "Set containerd registry config path"
  ansible.builtin.lineinfile:
    path: /etc/containerd/config.toml
    state: "present"
    insertafter: '^\s*\[plugins\."io\.containerd\.grpc\.v1\.cri"\.registry\]\s*$'
    regexp: '^\s*config_path\s*=\s*".*"\s*$'
    line: '      config_path = "/etc/containerd/certs.d"'
  become: true

# /etc/containerd/certs.dを作成
- name: "Create /etc/containerd/certs.d"
  ansible.builtin.file:
    path: "/etc/containerd/certs.d"
    state: directory
    owner: "root"
    group: "root"
    mode: "0755"
  become: true

# コンテナレジストリのエンドポイント設定を検証する
- name: "Validate containerd registry endpoint entries"
  ansible.builtin.assert:
    that:
      - item is mapping
      - item.endpoint is defined
      - (item.endpoint | string | length) > 0
      - (item.scheme | default('', true) | lower) in ['', 'http', 'https']
    fail_msg: "Specify each element of `k8s_containerd_registry_endpoints` as a dictionary containing `endpoint`, an optional `scheme` (http/https), and `skip_verify`."
  loop: "{{ k8s_containerd_registry_endpoints | default([], true) }}"

# /etc/containerd/certs.d/<endpoint>ディレクトリを作成する
# 留意事項: <endpoint>は, コンテナレジストリのエンドポイント(<ホスト名またはIPアドレス>:<ポート>)
- name: "Create containerd registry endpoint directories"
  ansible.builtin.file:
    path: "/etc/containerd/certs.d/{{ item.endpoint }}"
    state: directory
    owner: "root"
    group: "root"
    mode: "0755"
  loop: "{{ k8s_containerd_registry_endpoints | default([], true) }}"
  become: true

# containerd registry endpointごとにhosts.tomlを作成する
- name: "Configure containerd registry hosts.toml"
  ansible.builtin.template:
    src: containerd-registry-hosts.toml.j2
    dest: "/etc/containerd/certs.d/{{ item.endpoint }}/hosts.toml"
    owner: root
    group: root
    mode: '0644'
    backup: false
  loop: "{{ k8s_containerd_registry_endpoints | default([], true) }}"
  become: true

# containerdのsystemd override.conf (ホスト固有設定値定義) を作成する
- name: Setup containerd service
  ansible.builtin.template:
    src: containerd-override.conf.j2
    dest: /etc/systemd/system/containerd.service.d/override.conf
    owner: root
    group: root
    mode: '0644'
    backup: false

# 設定を反映するためにcontainerdを再起動する
- name: Restart containerd immediately
  ansible.builtin.systemd:
    name: containerd
    state: restarted
    enabled: true
  become: true

# マシンをリブートする
- name: Reboot host gracefully
  ansible.builtin.reboot:
    reboot_timeout: "{{ reboot_timeout_sec }}"
    msg: "Reboot triggered by role: common"
    pre_reboot_delay: 2
