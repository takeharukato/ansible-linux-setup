#
#  vc-manager 名前空間 (namespace) を作成する
#
---

#  vc-manager 名前空間 (namespace) を作成するタスク
# 1. 既存の 終了処理中 (Terminating) 名前空間 (namespace) を確認して強制削除
# 2. 終了処理中 (Terminating) の場合は強制削除を実行
# 3. 強制削除後, 完全に削除されるまで待機
# 4. 必要に応じて追加の finalize APIを用いた強制削除処理を実行
# 5. finalize APIを用いた強制削除処理完了まで再待機
# 6. 作成前に 名前空間の進行状態を再確認
# 7. 終了処理中 (Terminating) の名前空間 (namespace) が残る場合は失敗
# 8. 名前空間 (namespace) manifest をテンプレートから生成
# 9. kubectl apply で 新らたに名前空間 (namespace) を作成
# 10. 新たに作成した名前空間 (namespace) が 有効 (Active) になることを待機

# 1. 既存 名前空間 (namespace) の状態を確認
- name: "Check if vc-manager namespace exists and its phase"
  ansible.builtin.shell:
    cmd: "kubectl --kubeconfig {{ virtualcluster_supercluster_kubeconfig_path }} get namespace {{ virtualcluster_namespace }} -o jsonpath='{.status.phase}' 2>/dev/null"
    executable: /bin/bash
  register: result_namespace_phase
  become: true
  changed_when: false
  failed_when: false

# 2. 終了処理中 (Terminating) 状態の名前空間 (namespace) を強制削除
- name: "Force delete Terminating vc-manager namespace if it exists"
  ansible.builtin.script:
    cmd: >-
      {{ role_path }}/files/vc_force_delete_terminating_namespace.sh
      {{ virtualcluster_supercluster_kubeconfig_path }}
      {{ virtualcluster_namespace }}
      {{ virtualcluster_api_group }}
      true
  become: true
  changed_when: false
  failed_when: false
  when: (result_namespace_phase.stdout | trim) == 'Terminating'

# 3. 完全に削除されるまで待機
- name: "Wait for vc-manager namespace to be completely removed"
  ansible.builtin.shell:
    cmd: "kubectl --kubeconfig {{ virtualcluster_supercluster_kubeconfig_path }} get namespace {{ virtualcluster_namespace }} 2>/dev/null"
    executable: /bin/bash
  register: result_ns_removed
  until: result_ns_removed.rc != 0
  retries: 30
  delay: 2
  become: true
  changed_when: false
  when: (result_namespace_phase.stdout | trim) == 'Terminating'
  failed_when: false

# 4. 強制削除後も対象の名前空間 (namespace) が
# 終了処理中 (Terminating) 状態で残っている場合は finalize APIを通じて強制的削除を試みる
- name: "Aggressively finalize vc-manager namespace if still terminating"
  ansible.builtin.script:
    cmd: >-
      {{ role_path }}/files/vc_finalize_namespace_if_terminating.sh
      {{ virtualcluster_supercluster_kubeconfig_path }}
      {{ virtualcluster_namespace }}
  become: true
  changed_when: false
  failed_when: false
  when: (result_namespace_phase.stdout | trim) == 'Terminating'

# 5. 名前空間 (namespace) が完全に削除されるまで待機する (強制削除後)
- name: "Wait again for vc-manager namespace removal after aggressive finalize"
  ansible.builtin.shell:
    cmd: "kubectl --kubeconfig {{ virtualcluster_supercluster_kubeconfig_path }} get namespace {{ virtualcluster_namespace }} 2>/dev/null"
    executable: /bin/bash
  register: result_ns_removed_after_finalize
  until: result_ns_removed_after_finalize.rc != 0
  retries: 10
  delay: 2
  become: true
  changed_when: false
  failed_when: false
  when: (result_namespace_phase.stdout | trim) == 'Terminating'

# 6. 作成前に 名前空間 (namespace) が 終了処理中 (Terminating) のまま残っていないことを確認
- name: "Re-check vc-manager namespace phase before apply"
  ansible.builtin.shell:
    cmd: "kubectl --kubeconfig {{ virtualcluster_supercluster_kubeconfig_path }} get namespace {{ virtualcluster_namespace }} -o jsonpath='{.status.phase}' 2>/dev/null || echo 'NotFound'"
    executable: /bin/bash
  register: result_namespace_phase_before_apply
  become: true
  changed_when: false
  failed_when: false

# 7. 強制削除後も対象の名前空間 (namespace) が
# 終了処理中 (Terminating) 状態で残っている場合はエラーとして処理する
- name: "Fail if vc-manager namespace is still terminating"
  ansible.builtin.fail:
    msg: >-
      Namespace {{ virtualcluster_namespace }} is still in Terminating phase.
      Check remaining resources/finalizers and retry clean build.
  when: (result_namespace_phase_before_apply.stdout | trim) == 'Terminating'

# 8. 名前空間 (namespace) manifest をテンプレートから生成
- name: "Generate namespace manifest"
  ansible.builtin.template:
    src: "namespace.yaml.j2"
    dest: "{{ virtualcluster_config_dir }}/namespace.yaml"
    mode: "0644"

# 9. kubectl apply で 名前空間 (namespace) を作成
- name: "Create vc-manager namespace"
  ansible.builtin.command:
    cmd: "kubectl --kubeconfig {{ virtualcluster_supercluster_kubeconfig_path }} apply -f {{ virtualcluster_config_dir }}/namespace.yaml"
  register: result_apply_namespace
  become: true
  changed_when: >-
    'created' in result_apply_namespace.stdout
    or 'configured' in result_apply_namespace.stdout

# 10. 名前空間 (namespace) が正常に作成されたことを確認
- name: "Wait for vc-manager namespace to be created and active"
  ansible.builtin.command:
    cmd: "kubectl --kubeconfig {{ virtualcluster_supercluster_kubeconfig_path }} get namespace {{ virtualcluster_namespace }} -o jsonpath='{.status.phase}'"
  register: result_namespace
  until: result_namespace.stdout == 'Active'
  retries: 30
  delay: 2
  become: true
  changed_when: false
