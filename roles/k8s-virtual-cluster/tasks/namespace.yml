#
#  Create vc-manager namespace
#
---

#  vc-manager namespace を作成するタスク
# 1. 既存の Terminating namespace を確認して強制削除
# 2. namespace manifest をテンプレートから生成
# 3. kubectl apply で namespace を作成
# 4. namespace が完全に削除されたことを確認してから新規作成

# 1. 既存 namespace の状態を確認
- name: "Check if vc-manager namespace exists and its phase"
  ansible.builtin.shell:
    cmd: "kubectl --kubeconfig {{ virtualcluster_supercluster_kubeconfig_path }} get namespace {{ virtualcluster_namespace }} -o jsonpath='{.status.phase}' 2>/dev/null"
    executable: /bin/bash
  register: result_namespace_phase
  become: true
  changed_when: false
  failed_when: false

# 2. Terminating 状態の namespace を強制削除
- name: "Force delete Terminating vc-manager namespace if it exists"
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      NS_PHASE="$(kubectl --kubeconfig {{ virtualcluster_supercluster_kubeconfig_path }} \
        get namespace {{ virtualcluster_namespace }} -o jsonpath='{.status.phase}' 2>/dev/null)"
      if [[ "$NS_PHASE" == "Terminating" ]]; then
        echo "Force deleting Terminating namespace: {{ virtualcluster_namespace }}"
        kubectl --kubeconfig {{ virtualcluster_supercluster_kubeconfig_path }} \
          patch namespace {{ virtualcluster_namespace }} \
          -p '{"metadata":{"finalizers":[]}}' \
          --type=merge 2>&1 || true
        kubectl --kubeconfig {{ virtualcluster_supercluster_kubeconfig_path }} \
          delete namespace {{ virtualcluster_namespace }} \
          --grace-period=0 --force --timeout=30s --ignore-not-found 2>&1 || true
      fi
    executable: /bin/bash
  become: true
  changed_when: false
  failed_when: false

# 3. 完全に削除されるまで待機
- name: "Wait for vc-manager namespace to be completely removed"
  ansible.builtin.shell:
    cmd: "kubectl --kubeconfig {{ virtualcluster_supercluster_kubeconfig_path }} get namespace {{ virtualcluster_namespace }} 2>/dev/null"
    executable: /bin/bash
  register: result_ns_removed
  until: result_ns_removed.rc != 0
  retries: 30
  delay: 2
  become: true
  changed_when: false
  failed_when: false

# 4. namespace manifest をテンプレートから生成
- name: "Generate namespace manifest"
  ansible.builtin.template:
    src: "namespace.yaml.j2"
    dest: "{{ virtualcluster_config_dir }}/namespace.yaml"
    mode: "0644"

# 5. kubectl apply で namespace を作成
- name: "Create vc-manager namespace"
  ansible.builtin.command:
    cmd: "kubectl --kubeconfig {{ virtualcluster_supercluster_kubeconfig_path }} apply -f {{ virtualcluster_config_dir }}/namespace.yaml"
  register: result_apply_namespace
  become: true
  changed_when: >-
    'created' in result_apply_namespace.stdout
    or 'configured' in result_apply_namespace.stdout

# 6. 名前空間が正常に作成されたことを確認
- name: "Wait for vc-manager namespace to be created and active"
  ansible.builtin.command:
    cmd: "kubectl --kubeconfig {{ virtualcluster_supercluster_kubeconfig_path }} get namespace {{ virtualcluster_namespace }} -o jsonpath='{.status.phase}'"
  register: result_namespace
  until: result_namespace.stdout == 'Active'
  retries: 30
  delay: 2
  become: true
  changed_when: false
