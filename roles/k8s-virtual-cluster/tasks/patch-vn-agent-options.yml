#
# vn-agent options.go パッチ適用
# kubelet-client-certificate / kubelet-client-key の未配置時に
# fileNotExistOrEmpty が nil 参照で panic する問題を修正する。
# os.Stat のエラー時は「未存在または空」として扱い, 異常終了を防ぐ。
#
---

# vn-agent の証明書ファイル存在確認を nil 安全にするパッチを適用
- name: "Patch vn-agent options.go to avoid nil dereference on missing cert files"
  block:
    - name: "Apply nil-safe file stat patch to vn-agent options.go"
      ansible.posix.patch:
        src: "vn_agent_options.patch"
        basedir: "{{ virtualcluster_source_dir }}"
        strip: 1
      delegate_to: "{{ virtualcluster_build_host }}"
      become: false
      run_once: true
