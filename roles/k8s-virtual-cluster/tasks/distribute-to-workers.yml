#
#  コントロールプレーンからワーカーノードへイメージを配布
#
---

# 対象ホスト構成を k8s-register-image ロール側で解決する
- name: "Discover target hosts via k8s-register-image"
  ansible.builtin.include_role:
    name: k8s-register-image
    tasks_from: discover-target-hosts.yml
  vars:
    k8s_register_image_auto_discover_control_plane_hosts: true
    k8s_register_image_auto_discover_worker_hosts: true
    k8s_register_image_cluster_key: "{{ k8s_ctrlplane_endpoint }}"
    k8s_kubeconfig_to_discover_workers_path: "{{ virtualcluster_supercluster_kubeconfig_path }}"

# ワーカーノード情報の表示
- name: "Display worker node list"
  ansible.builtin.debug:
    msg: "Worker nodes found: {{ k8s_register_image_worker_hosts | join(', ') }}"
  when: k8s_register_image_is_cluster_leader | default(true) | bool

# コントロールプレーン上のイメージファイルを読み取り可能にする
# 留意事項:
#  - 後続のansible.builtin.fetchタスク内部で, slurp処理により
#    base64エンコードされることでログを汚染しないようにするため
- name: "Ensure image tar files are readable on control plane"
  ansible.builtin.file:
    path: "{{ virtualcluster_ctrlplane_cache_dir }}/{{ item }}-amd64.tar"
    mode: "0644"
  loop: "{{ virtualcluster_build_components }}"
  become: true
  when: k8s_register_image_is_cluster_leader | default(true) | bool

# イメージファイルをコントロールプレーンからlocalhostへ取得
# 留意事項:
#  - validate_checksumをfalse, becomeをfalseにすることで,
#    slurp処理によりbase64エンコードされることでログを
#    汚染しないようにする
- name: "Fetch images from control plane to localhost"
  ansible.builtin.fetch:
    src: "{{ virtualcluster_ctrlplane_cache_dir }}/{{ item }}-amd64.tar"
    dest: "{{ virtualcluster_local_cache_dir }}/"
    flat: true
    validate_checksum: false
  loop: "{{ virtualcluster_build_components }}"
  become: false
  when: k8s_register_image_is_cluster_leader | default(true) | bool

# localhost 上の tar を k8s-register-image ロールで worker に登録する
- name: "Register images on worker nodes via k8s-register-image"
  ansible.builtin.include_role:
    name: k8s-register-image
    tasks_from: register-workers.yml
  vars:
    k8s_register_image_components:
      manager: "{{ virtualcluster_local_cache_dir }}/manager-amd64.tar"
      syncer: "{{ virtualcluster_local_cache_dir }}/syncer-amd64.tar"
      vn-agent: "{{ virtualcluster_local_cache_dir }}/vn-agent-amd64.tar"
    k8s_register_image_expected_images:
      manager: "{{ virtualcluster_manager_image | default('virtualcluster/manager-amd64:latest', true) }}"
      syncer: "{{ virtualcluster_syncer_image | default('virtualcluster/syncer-amd64:latest', true) }}"
      vn-agent: "{{ virtualcluster_vn_agent_image | default('virtualcluster/vn-agent-amd64:latest', true) }}"
    k8s_register_image_remote_cache_dir: "/tmp"
    k8s_register_image_unqualified_image_registry: "{{ virtualcluster_unqualified_image_registry }}"
    k8s_register_image_auto_discover_worker_hosts: false
    k8s_register_image_auto_discover_control_plane_hosts: false
    k8s_register_image_skip_discovery: true

# コントロールプレーン上のイメージキャッシュを削除
- name: "Cleanup image cache on control plane"
  ansible.builtin.file:
    path: "{{ virtualcluster_ctrlplane_cache_dir }}"
    state: absent
  become: true
  when: k8s_register_image_is_cluster_leader | default(true) | bool

# localhost上のイメージキャッシュを削除
- name: "Cleanup image cache on localhost"
  ansible.builtin.file:
    path: "{{ virtualcluster_local_cache_dir }}"
    state: absent
  delegate_to: localhost
  run_once: true
  when:
    - k8s_register_image_is_cluster_leader | default(true) | bool
    - not (virtualcluster_keep_image_cache | bool)
    - (virtualcluster_image_source_mode | default('')) != 'build'

# 配布完了メッセージ
- name: "Image distribution completed"
  ansible.builtin.debug:
    msg: "Virtual Cluster images have been successfully distributed to all worker nodes"
  when: k8s_register_image_is_cluster_leader | default(true) | bool
