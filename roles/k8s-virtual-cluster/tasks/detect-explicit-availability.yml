#
#  explicitイメージtarの利用可否を早期判定
#
---

# 明示的に指定されたtarパスをコンポーネント名でマップした辞書を作成
# キー: コンポーネント名 (manager, syncer, vn-agent)
# 値: 明示的に指定されたtarパス (未指定の場合は空文字列)
- name: "Build explicit image tar path map (early detection)"
  ansible.builtin.set_fact:
    virtualcluster_explicit_image_tar_paths:
      manager: "{{ virtualcluster_manager_image_tar_path | default('', true) | trim }}"
      syncer: "{{ virtualcluster_syncer_image_tar_path | default('', true) | trim }}"
      vn-agent: "{{ virtualcluster_vn_agent_image_tar_path | default('', true) | trim }}"
  run_once: true

# 3コンポーネントすべてのパス指定有無を判定
# 処理ロジック: ビルド対象コンポーネントを格納した変数 virtualcluster_build_components
# に対して, 以下の処理を実施
#  1. map('extract', virtualcluster_explicit_image_tar_paths) で明示的に指定されたtarパスを
#     取り出し, trim() で空白除去,
#  2. reject('equalto', '') で空文字列を除外して長さを比較
#  3. 長さが3 (ビルド対象コンポーネント数) と一致すれば, すべてのコンポーネントに対して
#     明示的tarパスが指定されていると判定し, virtualcluster_explicit_image_tar_paths_complete を true に設定
- name: "Check whether all explicit image tar paths are provided (early detection)"
  ansible.builtin.set_fact:
    virtualcluster_explicit_image_tar_paths_complete: >-
      {{
        (
          virtualcluster_build_components
          | map('extract', virtualcluster_explicit_image_tar_paths)
          | map('trim')
          | reject('equalto', '')
          | list
          | length
        ) == (virtualcluster_build_components | length)
      }}
  run_once: true

# localhost上でtar実在を確認
# virtualcluster_explicit_image_tar_pathsに格納されたtarパスを順に確認し,
# virtualcluster_explict_tar_stat.results に格納する
- name: "Verify explicit image tar files exist on localhost (early detection)"
  ansible.builtin.stat:
    path: "{{ virtualcluster_explicit_image_tar_paths[item] }}"
  loop: "{{ virtualcluster_build_components }}"
  register: virtualcluster_explicit_tar_stat
  delegate_to: localhost
  become: false
  run_once: true
  when:
    - virtualcluster_explicit_image_tar_paths_complete

# explicit利用可能フラグを設定
# (virtualcluster_explicit_image_tar_paths_complete | default(false))
# で必要なtarパスがすべて指定されていることを確認し,
# さらに virtualcluster_explict_tar_stat.results のすべての要素の stat.exists
# を昇順にソートして最小値を取得し, 先頭が0でなければ, すべてのtarが存在する
# とみなして, true を返す
- name: "Set explicit image availability flag (early detection)"
  ansible.builtin.set_fact:
    virtualcluster_explicit_available: >-
      {{
        (virtualcluster_explicit_image_tar_paths_complete | default(false))
        and
        (
          virtualcluster_explicit_tar_stat.results
          | default([])
          | map(attribute='stat.exists')
          | list
          | min
          | default(false)
        )
      }}
  run_once: true

# localhost上でキャッシュtarの存在を確認
- name: "Verify cached image tar files exist (early detection)"
  ansible.builtin.stat:
    path: "{{ virtualcluster_image_cache_dir }}/latest/images/{{ item }}-amd64.tar"
  loop: "{{ virtualcluster_build_components }}"
  register: virtualcluster_cached_tar_stat
  delegate_to: localhost
  become: false
  run_once: true

# キャッシュ利用可否フラグを設定
- name: "Set cache availability flag (early detection)"
  ansible.builtin.set_fact:
    virtualcluster_cache_available: >-
      {{
        (
          virtualcluster_cached_tar_stat.results
          | default([])
          | map(attribute='stat.exists')
          | list
          | min
          | default(false)
        )
      }}
  run_once: true

# クリーンビルド時にキャッシュを無効化するフラグを算出
- name: "Set force-build flag on clean build (early detection)"
  ansible.builtin.set_fact:
    virtualcluster_force_build_mode: >-
      {{
        (virtualcluster_clean_build | bool)
        and (virtualcluster_build_from_source | bool)
        and (virtualcluster_skip_cache_on_clean_build | default(false) | bool)
      }}
  run_once: true

# 早期に動作モードを確定
- name: "Select image source mode (early detection)"
  ansible.builtin.set_fact:
    virtualcluster_image_source_mode: >-
      {{
        'explicit'
        if (virtualcluster_explicit_available | default(false))
        else (
          'build'
          if (virtualcluster_force_build_mode | default(false))
          else (
            'cache'
            if (virtualcluster_cache_available | default(false))
            else 'build'
          )
        )
      }}
  run_once: true
