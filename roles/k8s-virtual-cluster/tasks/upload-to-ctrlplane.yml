#
#  localhostからコントロールプレーンへイメージをアップロード
#
---

# localhost 上の tar を k8s-register-image ロールで control plane に登録する
- name: "Register images on control-plane nodes via k8s-register-image"
  ansible.builtin.include_role:
    name: k8s-register-image
    tasks_from: register-control-plane.yml
  vars:
    k8s_register_image_components:
      manager: "{{ virtualcluster_local_cache_dir }}/manager-amd64.tar"
      syncer: "{{ virtualcluster_local_cache_dir }}/syncer-amd64.tar"
      vn-agent: "{{ virtualcluster_local_cache_dir }}/vn-agent-amd64.tar"
    k8s_register_image_expected_images:
      manager: "{{ virtualcluster_manager_image | default('virtualcluster/manager-amd64:latest', true) }}"
      syncer: "{{ virtualcluster_syncer_image | default('virtualcluster/syncer-amd64:latest', true) }}"
      vn-agent: "{{ virtualcluster_vn_agent_image | default('virtualcluster/vn-agent-amd64:latest', true) }}"
    k8s_register_image_auto_discover_control_plane_hosts: true
    k8s_register_image_cluster_key: "{{ k8s_ctrlplane_endpoint }}"
    k8s_register_image_remote_cache_dir: "{{ virtualcluster_ctrlplane_cache_dir }}"
    k8s_register_image_unqualified_image_registry: "{{ virtualcluster_unqualified_image_registry }}"
    k8s_register_image_cleanup_remote_tar: false

# アップロード結果を表示
- name: "Display upload result"
  ansible.builtin.debug:
    msg: "Image tar files uploaded to control plane at {{ virtualcluster_ctrlplane_cache_dir }}"
  when: k8s_register_image_is_cluster_leader | default(true) | bool
