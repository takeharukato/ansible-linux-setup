#  -*- coding:utf-8 mode:yaml -*-
#  Ansible playbook
#
#  OS別 install 分岐
#

---

# Debian 系ホストでは local deb 導入タスクを実行する
- name: Install local package on Debian family
  ansible.builtin.include_tasks: install/debian.yml
  when: ansible_facts.os_family == 'Debian'

# RedHat 系ホストでは local rpm 導入タスクを実行する
- name: Install local package on RedHat family
  ansible.builtin.include_tasks: install/rhel.yml
  when: ansible_facts.os_family == 'RedHat'
