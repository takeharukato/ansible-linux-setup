#
#  ロール固有変数のデフォルト値
#  group_vars/all/all.yml やhost_varsで上書き可能とするため,
#  ロール名/defaults/main.yml に定義している

---

# build host / workspace
package_build_host: "localhost"
package_build_workspace: "/tmp/pkgbld-common"
package_build_output_dir: "{{ package_build_workspace }}/output"

# コンテナ実行関連
pkgbld_container_runtime: "docker"
pkgbld_container_network_mode: "host"
pkgbld_builder_image_debian: ""
pkgbld_builder_image_rhel: ""
pkgbld_container_workdir: "/work"
pkgbld_container_output_dir: "/work/output"

# build script(copyベース)
pkgbld_build_script_src: ""
pkgbld_build_script_name: ""
pkgbld_build_script_args: []
pkgbld_build_script_mode: "0755"
pkgbld_container_env_args: []

# package artifact
pkgbld_package_type: ""
pkgbld_package_name: ""
pkgbld_package_file_patterns_debian: []
pkgbld_package_file_patterns_rhel: []

# target/install
package_targets: []
pkgbld_install_deb_lock_wait_seconds: 600
pkgbld_install_dest_dir: "/tmp"
pkgbld_disable_gpg_check: true

# verify(第1波は導入確認のみ必須)
pkgbld_verify_version_enabled: false
pkgbld_verify_version_command: []
pkgbld_verify_version_regex: ""
pkgbld_verify_version_expected: ""
pkgbld_verify_strip_after_hyphen: false

# timeout / polling
pkgbld_build_timeout_seconds: 3600
pkgbld_build_loop_delay_seconds: 5

# cleanup
pkgbld_cleanup_build_workspace: true
