#
#  Debian/Ubuntu 環境用 Free Range Routing (FRR) 導入処理
#
---

# 留意事項
# FRRから使用するlibyangライブラリの構築方針について
#
# Debian/Ubuntu系の場合, libyangのパッケージ名がlibyang2と
# libyang2t64のように系統が分かれるため, 事前導入だけでは
# 最終状態を固定しきれない。
# このため, 構築時(コンパイル時)とインストール後の2段階で
# libyangのシンボル整合性を確認し, 不足する場合は構築ホスト上で
# libyangをビルドして導入する方針とした。


# 導入対象debファイルを frr_deb_files 変数に設定する
# 1. (frr_deb_files|default([]))
# 2. frr_deb_files が未定義の場合は, 構築ホストの hostvarsで定義されているfrr_deb_files を使用する
# 3. 構築ホストの hostvarsのfrr_deb_files が未定義の場合は,
#    制御ホストの hostvarsで定義されているfrr_deb_files を使用する
- name: Resolve FRR deb file list scope (host or localhost)
  ansible.builtin.set_fact:
    frr_deb_source_files: >-
      {{
        (frr_deb_files | default([]))
        if ((frr_deb_files | default([]) | length) > 0)
        else (
          (hostvars[frr_build_host].frr_deb_files | default([]))
          if ((hostvars[frr_build_host].frr_deb_files | default([]) | length) > 0)
          else (hostvars['localhost'].frr_deb_files | default([]))
        )
      }}

# 導入対象debファイルが見つからない場合は失敗する
- name: Fail when no FRR deb file is found in both host and localhost scopes
  ansible.builtin.fail:
    msg: "No FRR deb file found in both host and localhost scopes. Please define frr_deb_files variable with at least one deb file path."
  when: (frr_deb_source_files | default([]) | length) == 0

# 構築ホスト上のFRR debパッケージのパーミッションを読み取り可能に変更する
- name: Ensure built FRR deb package permissions are readable on build host
  ansible.builtin.file:
    path: "{{ item.path }}"
    mode: "0644"
  loop: "{{ frr_deb_source_files | default([]) }}"
  delegate_to: "{{ frr_build_host }}"
  run_once: true

# 構築ホストから制御ホストへ回収するための一時ディレクトリを作成する
- name: Ensure local staging directory exists for FRR deb packages
  ansible.builtin.tempfile:
    state: directory
    path: "{{ lookup('env', 'HOME') }}/.ansible/tmp"
    prefix: deb-fetch-
  register: frr_deb_fetch_tmpdir
  delegate_to: localhost
  become: false
  run_once: true

# 構築済みFRR debパッケージを制御ホストに回収する
- name: Fetch built FRR deb packages from build host to controller
  ansible.builtin.fetch:
    src: "{{ item.path }}"
    dest: "{{ frr_deb_fetch_tmpdir.path }}/{{ item.path | basename }}"
    flat: true
  loop: "{{ frr_deb_source_files | default([]) }}"
  delegate_to: "{{ frr_build_host }}"
  run_once: true

# 回収したFRR debパッケージの存在を確認する
- name: Check fetched FRR deb packages exist on controller
  ansible.builtin.stat:
    path: "{{ frr_deb_fetch_tmpdir.path }}/{{ item.path | basename }}"
  loop: "{{ frr_deb_source_files | default([]) }}"
  register: frr_deb_fetch_stat
  delegate_to: localhost
  become: false
  run_once: true

# 回収したFRR debパッケージが存在しない場合は失敗する
- name: Fail when fetched FRR deb package is missing on controller
  ansible.builtin.fail:
    msg: "Fetched FRR deb package is missing on controller: {{ item.item.path | basename }}"
  loop: "{{ frr_deb_fetch_stat.results | default([]) }}"
  when: not (item.stat.exists | default(false))

# 回収済みFRR debパッケージをターゲットホストへコピーする
- name: Copy built FRR deb packages from controller to target host
  ansible.builtin.copy:
    src: "{{ frr_deb_fetch_tmpdir.path }}/{{ item.path | basename }}"
    dest: "/tmp/{{ item.path | basename }}"
    mode: "0644"
  loop: "{{ frr_deb_source_files | default([]) }}"

# FRR debパッケージをターゲットホストに導入するための
# コマンド引数を構築する
# - env DEBIAN_FRONTEND=noninteractive apt-get -y install に加えて,
#   dpkg のロック待機時間と設定ファイル競合時の挙動を指定
# - DPkg::Lock::Timeout={{ frr_install_deb_lock_wait_seconds }} でロック取得待機時間を指定(単位:秒)
#   defaults/main.yml で frr_install_deb_lock_wait_seconds を定義している
# - `--force-confdef` と `--force-confold` は, 設定ファイルが競合した場合に既定動作を使いつつ,
#    既存設定を優先して保持しやすくするための指定
# - `--allow-change-held-packages` は, 保持されているパッケージの更新を許可するための指定
# - frr_deb_files からインストール対象の.debファイルパスを作成
#   1. default([]) で未定義時の安全性を確保
#   2. map(attribute='path') で各要素のpathだけ抽出
#   3. basename でファイル名部分に変換
#   4. regex_replace('^', '/tmp/') で /tmp/<ファイル名> 形式に変換
#   5. list で実リスト化し, 前半の固定コマンド配列に + で連結
- name: Build local FRR deb install argv
  ansible.builtin.set_fact:
    frr_deb_install_argv: >-
      {{
        [
          'env',
          'DEBIAN_FRONTEND=noninteractive',
          'apt-get',
          '-y',
          '--allow-change-held-packages',
          '-o',
          'DPkg::Lock::Timeout=' ~ (frr_install_deb_lock_wait_seconds | string),
          '-o',
          'Dpkg::Options::=--force-confdef',
          '-o',
          'Dpkg::Options::=--force-confold',
          'install'
        ]
        +
        (
          frr_deb_source_files
          | default([])
          | map(attribute='path')
          | map('basename')
          | map('regex_replace', '^', '/tmp/')
          | list
        )
      }}

# 念のため, dpkgのフロントエンドロックが解放されるまで待機する
- name: Wait for dpkg frontend lock to be released on target host
  ansible.builtin.shell: >-
    if fuser /var/lib/dpkg/lock-frontend >/dev/null 2>&1; then
      echo "dpkg lock is held";
      exit 1;
    fi
  register: frr_dpkg_lock_wait
  changed_when: false
  failed_when: false
  until: frr_dpkg_lock_wait.rc == 0
  retries: "{{ (frr_build_timeout_seconds // frr_build_loop_delay_seconds) | int }}"
  delay: "{{ frr_build_loop_delay_seconds }}"

#
# FRR実行時に必要なlibyangシンボルが不足する場合は先行導入する
#  1. ldconfig -p | awk '/libyang\.so\.2/{print $4; exit}'
#    a. ldconfig -p で共有ライブラリのキャッシュを表示し, libyang.so.2 のパスを取得する
#    b. awk '/libyang\.so\.2/{print $4; exit}'
#       libyang.so.2 が見つかった場合はそのパスを出力し,
#       見つからなければ空文字列を出力する
#  2. test -n "${libyang_so}"
#     libyang.so.2 のパスが空文字列でないことを確認する
#  3. nm -D "${libyang_so}" 2>/dev/null | grep -qE 'lyd_parent$'
#     libyang.so.2 のシンボルテーブルを表示し, lyd_parent シンボルが存在することを確認する
#     register で結果を grepの終了コードをfrr_libyang_symbol_check.rc に格納する
#     a. frr_libyang_symbol_check.rc が 0 の場合はシンボルが存在するため, libyangの先行導入は不要
#     b. frr_libyang_symbol_check.rc が 0以外 の場合はシンボルが存在しないため, libyangの先行導入が必要
- name: Check whether installed libyang provides lyd_parent symbol
  ansible.builtin.shell: >-
    set -o pipefail;
    libyang_so="$(ldconfig -p | awk '/libyang\.so\.2/{print $4; exit}')";
    test -n "${libyang_so}";
    nm -D "${libyang_so}" 2>/dev/null | grep -qE 'lyd_parent$'
  args:
    executable: /bin/bash
  register: frr_libyang_symbol_check
  changed_when: false
  failed_when: false

#
# FRR実行時に必要なlibyangシンボルが不足する場合は, libyangをビルドして先行導入する
#

# FRR実行時に必要なlibyangシンボルが不足する場合は, 構築ホスト上でlibyangをビルドして導入する
# frr_libyang_force_remediate が true の場合は, シンボル不足の有無に関わらず強制的にlibyangを再導入する
- name: Remediate libyang packages before FRR install when symbol is missing
  ansible.builtin.include_tasks: remediate-libyang.yml
  vars:
    frr_libyang_symbol_check_rc: "{{ frr_libyang_symbol_check.rc | default(0) }}"
    frr_libyang_force_remediate: true
    frr_libyang_phase_label: "before FRR install"
    frr_libyang_fetch_prefix: "libyang-fetch-before-"

# FRR debパッケージ導入時にpostinstでサービス自動起動させないよう一時的に抑止する
- name: Install local FRR deb packages in one transaction with service autostart suppressed
  block:
    # policy-rc.d を一時的に配置して, postinstのサービス自動起動を抑止する
    - name: Create temporary policy-rc.d to suppress service autostart
      ansible.builtin.copy:
        dest: /usr/sbin/policy-rc.d
        mode: "0755"
        content: |
          #!/bin/sh
          exit 101

    # FRR debパッケージのインストールコマンドを非同期で実行する
    - name: Run local FRR deb installation command in background
      ansible.builtin.command:
        argv: "{{ frr_deb_install_argv }}"
      environment:
        APT_LISTCHANGES_FRONTEND: none
        NEEDRESTART_MODE: a
      async: "{{ frr_build_timeout_seconds }}"
      poll: 0
      register: frr_local_deb_install_job
      changed_when: true

    # FRR debパッケージのインストールコマンドの完了を待ち合わせる
    - name: Wait local FRR deb installation with progress polling
      ansible.builtin.async_status:
        jid: "{{ frr_local_deb_install_job.ansible_job_id }}"
      register: frr_local_deb_install_cmd
      until: frr_local_deb_install_cmd.finished
      retries: "{{ (frr_build_timeout_seconds // frr_build_loop_delay_seconds) | int }}"
      delay: "{{ frr_build_loop_delay_seconds }}"
      failed_when: false
  always:
    - name: Remove temporary policy-rc.d after FRR deb installation
      ansible.builtin.file:
        path: /usr/sbin/policy-rc.d
        state: absent

# FRR debパッケージのインストールコマンドが失敗した場合は処理を中断する
- name: Fail when local FRR deb installation command failed
  ansible.builtin.fail:
    msg: >-
      Local FRR deb installation failed.
      rc={{ frr_local_deb_install_cmd.rc | default('unknown') }}
      stdout={{ frr_local_deb_install_cmd.stdout | default('') }}
      stderr={{ frr_local_deb_install_cmd.stderr | default('') }}
  when: (frr_local_deb_install_cmd.rc | default(0)) != 0

# FRR導入後にlibyangが再上書きされるケースに備え, 再度シンボル整合性を確認する
- name: Re-check whether installed libyang provides lyd_parent symbol after FRR install
  ansible.builtin.shell: >-
    set -o pipefail;
    libyang_so="$(ldconfig -p | awk '/libyang\.so\.2/{print $4; exit}')";
    test -n "${libyang_so}";
    nm -D "${libyang_so}" 2>/dev/null | grep -qE 'lyd_parent$'
  args:
    executable: /bin/bash
  register: frr_libyang_symbol_check_after_install
  changed_when: false
  failed_when: false

#
# FRR導入後にlibyangのシンボルが不足する場合は,
# 構築ホスト上でlibyangを再ビルドする
#

# FRR導入後にlibyangのシンボルが不足する場合は, 構築ホスト上でlibyangを再ビルドして導入する
- name: Remediate libyang packages after FRR install when symbol is missing
  ansible.builtin.include_tasks: remediate-libyang.yml
  vars:
    frr_libyang_symbol_check_rc: "{{ frr_libyang_symbol_check_after_install.rc | default(0) }}"
    frr_libyang_phase_label: "after FRR install"
    frr_libyang_fetch_prefix: "libyang-fetch-after-"

# インストールされたFRRパッケージのバージョンを取得する
- name: Get installed FRR package version on target host
  ansible.builtin.command:
    argv:
      - dpkg-query
      - -W
      - -f=${Version}
      - frr
  register: frr_installed_deb_version_cmd
  changed_when: false

# インストールされたFRRパッケージのバージョンが要求されたバージョンと一致することを確認する
- name: Assert installed FRR deb upstream version matches request
  ansible.builtin.assert:
    that:
      - "(frr_installed_deb_version_cmd.stdout | trim | regex_replace('-.*$', '')) == (frr_version | trim)"
    fail_msg: >-
      Installed FRR deb version mismatch.
      requested={{ frr_version | trim }}, installed={{ frr_installed_deb_version_cmd.stdout | trim }}
