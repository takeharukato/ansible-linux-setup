#
#  FRR 導入処理
#
---

# FRR debパッケージをターゲットホストにコピーする
- name: Copy built FRR deb packages to target host
  ansible.builtin.copy:
    src: "{{ item.path }}"
    dest: "/tmp/{{ item.path | basename }}"
    mode: "0644"
  loop: "{{ frr_deb_files | default([]) }}"

# FRR debパッケージをターゲットホストに導入するための
# コマンド引数を構築する
# - apt-get -y install に加えて, dpkg のロック待機時間と設定ファイル競合時の挙動を指定
# - DPkg::Lock::Timeout={{ frr_install_deb_lock_wait_seconds }} でロック取得待機時間を指定(単位:秒)
#   defaults/main.yml で frr_install_deb_lock_wait_seconds を定義している
# - `--force-confdef` と `--force-confold` は, 設定ファイルが競合した場合に既定動作を使いつつ,
#    既存設定を優先して保持しやすくするための指定
# - frr_deb_files からインストール対象の.debファイルパスを作成
#   1. default([]) で未定義時の安全性を確保
#   2. map(attribute='path') で各要素のpathだけ抽出
#   3. basename でファイル名部分に変換
#   4. regex_replace('^', '/tmp/') で /tmp/<ファイル名> 形式に変換
#   5. list で実リスト化し, 前半の固定コマンド配列に + で連結
- name: Build local FRR deb install argv
  ansible.builtin.set_fact:
    frr_deb_install_argv: >-
      {{
        [
          'apt-get',
          '-y',
          '-o',
          'DPkg::Lock::Timeout=' ~ (frr_install_deb_lock_wait_seconds | string),
          '-o',
          'Dpkg::Options::=--force-confdef',
          '-o',
          'Dpkg::Options::=--force-confold',
          'install'
        ]
        +
        (
          frr_deb_files
          | default([])
          | map(attribute='path')
          | map('basename')
          | map('regex_replace', '^', '/tmp/')
          | list
        )
      }}

# 念のため, dpkgのフロントエンドロックが解放されるまで待機する
- name: Wait for dpkg frontend lock to be released on target host
  ansible.builtin.shell: >-
    if fuser /var/lib/dpkg/lock-frontend >/dev/null 2>&1; then
      echo "dpkg lock is held";
      exit 1;
    fi
  register: frr_dpkg_lock_wait
  changed_when: false
  failed_when: false
  until: frr_dpkg_lock_wait.rc == 0
  retries: "{{ (frr_build_timeout_seconds // frr_build_loop_delay_seconds) | int }}"
  delay: "{{ frr_build_loop_delay_seconds }}"

# FRR実行時に必要なlibyangシンボルが不足する場合は先行導入する
- name: Check whether installed libyang provides lyd_parent symbol
  ansible.builtin.shell: >-
    libyang_so="$(ldconfig -p | awk '/libyang\.so\.2/{print $4; exit}')";
    test -n "${libyang_so}";
    nm -D "${libyang_so}" 2>/dev/null | grep -qE 'lyd_parent$'
  register: frr_libyang_symbol_check
  changed_when: false
  failed_when: false

#
# FRR実行時に必要なlibyangシンボルが不足する場合は, libyangをビルドして先行導入する
#

# libyangをビルドするためのシェルスクリプトを制御ホスト上に生成する
- name: Render libyang installer script on build host
  ansible.builtin.template:
    src: install-libyang.sh.j2
    dest: /tmp/install-libyang.sh
    mode: "0755"
  delegate_to: "{{ frr_build_host }}"
  run_once: true
  when:
    - ansible_facts.os_family == 'Debian'

# libyangのランタイムパッケージのcontrolファイルを制御ホスト上に生成する
- name: Render libyang runtime control template on build host
  ansible.builtin.template:
    src: install-libyang-runtime.control.j2
    dest: /tmp/install-libyang-runtime.control.in
    mode: "0644"
  delegate_to: "{{ frr_build_host }}"
  run_once: true
  when:
    - ansible_facts.os_family == 'Debian'

# libyangの開発パッケージのcontrolファイルを制御ホスト上に生成する
- name: Render libyang dev control template on build host
  ansible.builtin.template:
    src: install-libyang-dev.control.j2
    dest: /tmp/install-libyang-dev.control.in
    mode: "0644"
  delegate_to: "{{ frr_build_host }}"
  run_once: true
  when:
    - ansible_facts.os_family == 'Debian'

# FRR実行時に必要なlibyangシンボルが不足する場合は, 制御ホスト上でlibyangをビルドする
- name: Build compatible libyang deb packages on build host when symbol is missing
  ansible.builtin.command:
    argv:
      - /bin/bash
      - /tmp/install-libyang.sh
  delegate_to: "{{ frr_build_host }}"
  run_once: true
  when:
    - ansible_facts.os_family == 'Debian'
    - frr_libyang_symbol_check.rc != 0

# 構築済みのlibyang debパッケージを構築ホスト上で探索する
- name: Discover built libyang deb packages on build host when symbol is missing
  ansible.builtin.find:
    paths: /tmp
    patterns:
      - "libyang2_{{ frr_libyang_version }}-1_*.deb"
      - "libyang2t64_{{ frr_libyang_version }}-1_*.deb"
      - "libyang2-dev_{{ frr_libyang_version }}-1_*.deb"
    file_type: file
  register: frr_libyang_deb_files_before_install_discovered
  delegate_to: "{{ frr_build_host }}"
  run_once: true
  when:
    - ansible_facts.os_family == 'Debian'
    - frr_libyang_symbol_check.rc != 0

# 構築済みのlibyang debパッケージのリストを取得する
- name: Set built libyang deb package list when symbol is missing
  ansible.builtin.set_fact:
    frr_libyang_deb_files_before_install: "{{ frr_libyang_deb_files_before_install_discovered.files | default([]) }}"
  delegate_to: "{{ frr_build_host }}"
  run_once: true
  when:
    - ansible_facts.os_family == 'Debian'
    - frr_libyang_symbol_check.rc != 0

# 構築済みのlibyang debパッケージが存在しない場合は処理を中断する
- name: Fail when libyang deb packages were not generated before FRR install
  ansible.builtin.fail:
    msg: "libyang deb package was not generated on build host for requested version {{ frr_libyang_version }}"
  when:
    - ansible_facts.os_family == 'Debian'
    - frr_libyang_symbol_check.rc != 0
    - (frr_libyang_deb_files_before_install | default([]) | length) == 0
  delegate_to: "{{ frr_build_host }}"
  run_once: true

# 構築したlibyang debパッケージのパーミッションを変更する
- name: Ensure built libyang deb package permissions are readable before FRR install
  ansible.builtin.file:
    path: "{{ item.path }}"
    mode: "0644"
  loop: "{{ frr_libyang_deb_files_before_install | default([]) }}"
  delegate_to: "{{ frr_build_host }}"
  run_once: true
  when:
    - ansible_facts.os_family == 'Debian'
    - frr_libyang_symbol_check.rc != 0

# 導入先のホスト上にパッケージ導入用の一時ディレクトリ(ステージングディレクトリ)を作成する
- name: Ensure local staging directory exists for libyang deb packages before FRR install
  ansible.builtin.tempfile:
    state: directory
    path: "{{ lookup('env', 'HOME') }}/.ansible/tmp"
    prefix: libyang-fetch-before-
  register: frr_libyang_fetch_before_tmpdir
  delegate_to: localhost
  become: false
  run_once: true
  when:
    - ansible_facts.os_family == 'Debian'
    - frr_libyang_symbol_check.rc != 0

# 構築したlibyang debパッケージを構築ホストから導入先ホストに回収するために,
# 構築ホストから制御ホストにコピーする
- name: Fetch built libyang deb packages from build host to controller before FRR install
  ansible.builtin.fetch:
    src: "{{ item.path }}"
    dest: "{{ frr_libyang_fetch_before_tmpdir.path }}/{{ item.path | basename }}"
    flat: true
  loop: "{{ frr_libyang_deb_files_before_install | default([]) }}"
  delegate_to: "{{ frr_build_host }}"
  run_once: true
  when:
    - ansible_facts.os_family == 'Debian'
    - frr_libyang_symbol_check.rc != 0

# 回収したlibyang debパッケージが制御ホスト上に存在することを確認する
- name: Check fetched libyang deb packages exist on controller before FRR install
  ansible.builtin.stat:
    path: "{{ frr_libyang_fetch_before_tmpdir.path }}/{{ item.path | basename }}"
  loop: "{{ frr_libyang_deb_files_before_install | default([]) }}"
  register: frr_libyang_fetch_before_stat
  delegate_to: localhost
  become: false
  run_once: true
  when:
    - ansible_facts.os_family == 'Debian'
    - frr_libyang_symbol_check.rc != 0

# 回収したlibyang debパッケージが制御ホスト上に存在しない場合は処理を中断する
- name: Fail when fetched libyang deb package is missing on controller before FRR install
  ansible.builtin.fail:
    msg: "Fetched libyang deb package is missing on controller: {{ item.item.path | basename }}"
  loop: "{{ frr_libyang_fetch_before_stat.results | default([]) }}"
  when:
    - ansible_facts.os_family == 'Debian'
    - frr_libyang_symbol_check.rc != 0
    - not (item.stat.exists | default(false))

# 回収したlibyang debパッケージを導入先ホストにコピーする
- name: Copy built libyang deb packages from controller to target host when symbol is missing
  ansible.builtin.copy:
    src: "{{ frr_libyang_fetch_before_tmpdir.path }}/{{ item.path | basename }}"
    dest: "/tmp/{{ item.path | basename }}"
    mode: "0644"
  loop: "{{ frr_libyang_deb_files_before_install | default([]) }}"
  when:
    - ansible_facts.os_family == 'Debian'
    - frr_libyang_symbol_check.rc != 0

# 構築したlibyang debパッケージをターゲットホストに導入する
- name: Install built libyang deb packages on target host when symbol is missing
  ansible.builtin.shell: >-
    set -euo pipefail;
    shopt -s nullglob;
    debs=(/tmp/libyang2_{{ frr_libyang_version }}-1_*.deb /tmp/libyang2t64_{{ frr_libyang_version }}-1_*.deb /tmp/libyang2-dev_{{ frr_libyang_version }}-1_*.deb);
    test -n "${debs[*]:-}";
    apt-get -y --allow-downgrades install "${debs[@]}";
    ldconfig
  args:
    executable: /bin/bash
  when:
    - ansible_facts.os_family == 'Debian'
    - frr_libyang_symbol_check.rc != 0

# FRR debパッケージ導入時にpostinstでサービス自動起動させないよう一時的に抑止する
- name: Install local FRR deb packages in one transaction with service autostart suppressed
  block:
    # policy-rc.d を一時的に配置して, postinstのサービス自動起動を抑止する
    - name: Create temporary policy-rc.d to suppress service autostart
      ansible.builtin.copy:
        dest: /usr/sbin/policy-rc.d
        mode: "0755"
        content: |
          #!/bin/sh
          exit 101

    # FRR debパッケージのインストールコマンドを非同期で実行する
    - name: Run local FRR deb installation command in background
      ansible.builtin.command:
        argv: "{{ frr_deb_install_argv }}"
      environment:
        DEBIAN_FRONTEND: noninteractive
        APT_LISTCHANGES_FRONTEND: none
        NEEDRESTART_MODE: a
      async: "{{ frr_build_timeout_seconds }}"
      poll: 0
      register: frr_local_deb_install_job
      changed_when: true

    # FRR debパッケージのインストールコマンドの完了を待ち合わせる
    - name: Wait local FRR deb installation with progress polling
      ansible.builtin.async_status:
        jid: "{{ frr_local_deb_install_job.ansible_job_id }}"
      register: frr_local_deb_install_cmd
      until: frr_local_deb_install_cmd.finished
      retries: "{{ (frr_build_timeout_seconds // frr_build_loop_delay_seconds) | int }}"
      delay: "{{ frr_build_loop_delay_seconds }}"
      failed_when: false
  always:
    - name: Remove temporary policy-rc.d after FRR deb installation
      ansible.builtin.file:
        path: /usr/sbin/policy-rc.d
        state: absent

# FRR debパッケージのインストールコマンドが失敗した場合は処理を中断する
- name: Fail when local FRR deb installation command failed
  ansible.builtin.fail:
    msg: >-
      Local FRR deb installation failed.
      rc={{ frr_local_deb_install_cmd.rc | default('unknown') }}
      stderr={{ frr_local_deb_install_cmd.stderr | default('') }}
  when: (frr_local_deb_install_cmd.rc | default(0)) != 0

# FRR導入後にlibyangが再上書きされるケースに備え, 再度シンボル整合性を確認する
- name: Re-check whether installed libyang provides lyd_parent symbol after FRR install
  ansible.builtin.shell: >-
    libyang_so="$(ldconfig -p | awk '/libyang\.so\.2/{print $4; exit}')";
    test -n "${libyang_so}";
    nm -D "${libyang_so}" 2>/dev/null | grep -qE 'lyd_parent$'
  register: frr_libyang_symbol_check_after_install
  changed_when: false
  failed_when: false

# FRR導入後にlibyangのシンボルが不足する場合は, 制御ホスト上でlibyangを再ビルドする
- name: Rebuild compatible libyang deb packages on build host when symbol is missing after FRR install
  ansible.builtin.command:
    argv:
      - /bin/bash
      - /tmp/install-libyang.sh
  delegate_to: "{{ frr_build_host }}"
  run_once: true
  when:
    - ansible_facts.os_family == 'Debian'
    - frr_libyang_symbol_check_after_install.rc != 0

# 再構築したlibyang debパッケージを構築ホスト上で探索する
- name: Discover rebuilt libyang deb packages on build host when symbol is missing after FRR install
  ansible.builtin.find:
    paths: /tmp
    patterns:
      - "libyang2_{{ frr_libyang_version }}-1_*.deb"
      - "libyang2t64_{{ frr_libyang_version }}-1_*.deb"
      - "libyang2-dev_{{ frr_libyang_version }}-1_*.deb"
    file_type: file
  register: frr_libyang_deb_files_after_install_discovered
  delegate_to: "{{ frr_build_host }}"
  run_once: true
  when:
    - ansible_facts.os_family == 'Debian'
    - frr_libyang_symbol_check_after_install.rc != 0

# 構築ホスト上で再構築したlibyang debパッケージのリストを取得する
- name: Set rebuilt libyang deb package list when symbol is missing after FRR install
  ansible.builtin.set_fact:
    frr_libyang_deb_files_after_install: "{{ frr_libyang_deb_files_after_install_discovered.files | default([]) }}"
  delegate_to: "{{ frr_build_host }}"
  run_once: true
  when:
    - ansible_facts.os_family == 'Debian'
    - frr_libyang_symbol_check_after_install.rc != 0

# 再構築したlibyang debパッケージが存在しない場合は処理を中断する
- name: Fail when libyang deb packages were not generated after FRR install
  ansible.builtin.fail:
    msg: "libyang deb package was not generated on build host for requested version {{ frr_libyang_version }}"
  when:
    - ansible_facts.os_family == 'Debian'
    - frr_libyang_symbol_check_after_install.rc != 0
    - (frr_libyang_deb_files_after_install | default([]) | length) == 0
  delegate_to: "{{ frr_build_host }}"
  run_once: true

# 再構築したlibyang debパッケージのパーミッションを変更する
- name: Ensure rebuilt libyang deb package permissions are readable after FRR install
  ansible.builtin.file:
    path: "{{ item.path }}"
    mode: "0644"
  loop: "{{ frr_libyang_deb_files_after_install | default([]) }}"
  delegate_to: "{{ frr_build_host }}"
  run_once: true
  when:
    - ansible_facts.os_family == 'Debian'
    - frr_libyang_symbol_check_after_install.rc != 0

# 制御ホスト上に構築したパッケージを保存するための一時ディレクトリが存在しない場合は作成する
- name: Ensure local staging directory exists for rebuilt libyang deb packages after FRR install
  ansible.builtin.tempfile:
    state: directory
    path: "{{ lookup('env', 'HOME') }}/.ansible/tmp"
    prefix: libyang-fetch-after-
  register: frr_libyang_fetch_after_tmpdir
  delegate_to: localhost
  become: false
  run_once: true
  when:
    - ansible_facts.os_family == 'Debian'
    - frr_libyang_symbol_check_after_install.rc != 0

# 再構築したlibyang debパッケージを構築ホストから制御ホストにコピーする
- name: Fetch rebuilt libyang deb packages from build host to controller after FRR install
  ansible.builtin.fetch:
    src: "{{ item.path }}"
    dest: "{{ frr_libyang_fetch_after_tmpdir.path }}/{{ item.path | basename }}"
    flat: true
  loop: "{{ frr_libyang_deb_files_after_install | default([]) }}"
  delegate_to: "{{ frr_build_host }}"
  run_once: true
  when:
    - ansible_facts.os_family == 'Debian'
    - frr_libyang_symbol_check_after_install.rc != 0

# 再構築したlibyang debパッケージが制御ホスト上に存在することを確認する
- name: Check fetched rebuilt libyang deb packages exist on controller after FRR install
  ansible.builtin.stat:
    path: "{{ frr_libyang_fetch_after_tmpdir.path }}/{{ item.path | basename }}"
  loop: "{{ frr_libyang_deb_files_after_install | default([]) }}"
  register: frr_libyang_fetch_after_stat
  delegate_to: localhost
  become: false
  run_once: true
  when:
    - ansible_facts.os_family == 'Debian'
    - frr_libyang_symbol_check_after_install.rc != 0

# 再構築したlibyang debパッケージが制御ホスト上に存在しない場合は処理を中断する
- name: Fail when fetched rebuilt libyang deb package is missing on controller after FRR install
  ansible.builtin.fail:
    msg: "Fetched rebuilt libyang deb package is missing on controller: {{ item.item.path | basename }}"
  loop: "{{ frr_libyang_fetch_after_stat.results | default([]) }}"
  when:
    - ansible_facts.os_family == 'Debian'
    - frr_libyang_symbol_check_after_install.rc != 0
    - not (item.stat.exists | default(false))

# 再構築したlibyang debパッケージを導入先ホストにコピーする
- name: Copy rebuilt libyang deb packages from controller to target host when symbol is missing after FRR install
  ansible.builtin.copy:
    src: "{{ frr_libyang_fetch_after_tmpdir.path }}/{{ item.path | basename }}"
    dest: "/tmp/{{ item.path | basename }}"
    mode: "0644"
  loop: "{{ frr_libyang_deb_files_after_install | default([]) }}"
  when:
    - ansible_facts.os_family == 'Debian'
    - frr_libyang_symbol_check_after_install.rc != 0

# 構築したlibyang debパッケージをターゲットホストに再導入する
#   - set -euo pipefail でエラー時に即座に終了するようにする
#   - shopt -s nullglob で, globパターンにマッチするファイルが存在しない場合に空配列を返すようにする
#   - debs=(...) で, 以下の3つのパターンにマッチするファイルを配列に格納する
#      a. /tmp/libyang2_{{ frr_libyang_version }}-1_*.deb
#      b. /tmp/libyang2t64_{{ frr_libyang_version }}-1_*.deb
#      c. /tmp/libyang2-dev_{{ frr_libyang_version }}-1_*.deb
#   - test -n "${debs[*]:-}" で, 配列が空でないことを確認する
#   - apt-get -y --allow-downgrades install "${debs[@]}" で, 配列に格納されたdebパッケージを一括導入する
#   - ldconfig で, ライブラリキャッシュを更新する
- name: Install rebuilt libyang deb packages when symbol is missing after FRR install
  ansible.builtin.shell: >-
    set -euo pipefail;
    shopt -s nullglob;
    debs=(/tmp/libyang2_{{ frr_libyang_version }}-1_*.deb /tmp/libyang2t64_{{ frr_libyang_version }}-1_*.deb /tmp/libyang2-dev_{{ frr_libyang_version }}-1_*.deb);
    test -n "${debs[*]:-}";
    apt-get -y --allow-downgrades install "${debs[@]}";
    ldconfig
  args:
    executable: /bin/bash
  when:
    - ansible_facts.os_family == 'Debian'
    - frr_libyang_symbol_check_after_install.rc != 0

# インストールされたFRRパッケージのバージョンを取得する
- name: Get installed FRR package version on target host
  ansible.builtin.command:
    argv:
      - dpkg-query
      - -W
      - -f=${Version}
      - frr
  register: frr_installed_deb_version_cmd
  changed_when: false

# インストールされたFRRパッケージのバージョンが要求されたバージョンと一致することを確認する
- name: Assert installed FRR deb upstream version matches request
  ansible.builtin.assert:
    that:
      - "(frr_installed_deb_version_cmd.stdout | trim | regex_replace('-.*$', '')) == (frr_version | trim)"
    fail_msg: >-
      Installed FRR deb version mismatch.
      requested={{ frr_version | trim }}, installed={{ frr_installed_deb_version_cmd.stdout | trim }}
